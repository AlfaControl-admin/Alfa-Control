<!DOCTYPE html>
<html lang="uz" data-theme="night">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Alfa Control v6</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;600&family=Manrope:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
/* ═══════════════ TOKENS ═══════════════ */
[data-theme="night"]{--bg:#060810;--panel:#0b0e18;--s1:#10141f;--s2:#141928;--bd:#1c2236;--bd2:#222b42;--tx:#dde3f2;--mt:#566080;--mt2:#8592b0;--sh:rgba(0,0,0,.7);--gr:rgba(240,180,41,.03);--ib:#10141f}
[data-theme="day"]{--bg:#edf0fa;--panel:#fff;--s1:#f3f5fd;--s2:#eaecf6;--bd:#cdd3e8;--bd2:#bcc4dc;--tx:#18203c;--mt:#8a93b0;--mt2:#5a6580;--sh:rgba(0,0,0,.1);--gr:rgba(26,32,64,.04);--ib:#f3f5fd}
:root{--a:#f0b429;--ad:rgba(240,180,41,.1);--g:#0ecf82;--gd:rgba(14,207,130,.1);--r:#ff4455;--rd:rgba(255,68,85,.1);--b:#4dabf7;--p:#9b8afb;--mn:'JetBrains Mono',monospace;--sn:'Manrope',sans-serif;--dp:'Bebas Neue',sans-serif;--sw:268px;--topH:54px;--fs:13px;--fs-sm:11px;--fs-xs:10px;--fs-mono:11px}

/* ═══════════════ RESET & BASE ═══════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:var(--sn)}
body{background:var(--bg);color:var(--tx);transition:background .3s,color .25s;overflow:hidden}
button{font-family:var(--sn);cursor:pointer}
input,select,textarea{font-family:var(--mn)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* ═══════════════ THEME TOGGLE ═══════════════ */
.thbtn{position:fixed;top:10px;right:12px;z-index:800;display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--bd2);border-radius:20px;padding:5px 10px 5px 7px;cursor:pointer;box-shadow:0 2px 10px var(--sh);transition:all .3s;font-family:var(--mn);font-size:10px;color:var(--mt2);user-select:none}
.thbtn:hover{border-color:var(--a)}.trk{width:30px;height:16px;background:var(--s2);border-radius:8px;border:1px solid var(--bd2);position:relative;transition:background .3s;flex-shrink:0}
[data-theme="day"] .trk{background:var(--a)}.tth{position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:var(--mt);transition:all .3s}[data-theme="day"] .tth{left:16px;background:#fff}
@media(max-width:640px){.thbtn span{display:none}}

/* ═══════════════ LOGIN ═══════════════ */
#LS{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:background .3s;padding:16px}
.lgrid{position:absolute;inset:0;pointer-events:none;background-image:repeating-linear-gradient(0deg,transparent,transparent 59px,var(--gr) 60px),repeating-linear-gradient(90deg,transparent,transparent 59px,var(--gr) 60px)}
.lbox{position:relative;z-index:1;background:var(--panel);border:1px solid var(--bd2);border-radius:14px;padding:36px 32px;width:100%;max-width:400px;box-shadow:0 24px 60px var(--sh);animation:su .4s cubic-bezier(.22,1,.36,1);transition:background .3s}
@keyframes su{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.llogo{font-family:var(--dp);font-size:38px;letter-spacing:3px;color:var(--a)}.lsub{font-family:var(--mn);font-size:10px;color:var(--mt);letter-spacing:3px;text-transform:uppercase;margin-bottom:28px}
.lf{margin-bottom:12px}.ll{font-family:var(--mn);font-size:10px;letter-spacing:2px;color:var(--mt);text-transform:uppercase;display:block;margin-bottom:5px}
.li,.lsel{width:100%;background:var(--ib);border:1px solid var(--bd2);color:var(--tx);font-family:var(--mn);font-size:13px;padding:10px 12px;border-radius:6px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.li:focus,.lsel:focus{border-color:var(--a)}.lsel option{background:var(--s1)}
.pw-wrap{position:relative}.pw-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--mt);cursor:pointer;padding:4px;font-size:16px;transition:color .2s;line-height:1}.pw-eye:hover{color:var(--a)}
.lerr{color:var(--r);font-family:var(--mn);font-size:11px;margin-bottom:10px;display:none;padding:8px 10px;background:var(--rd);border:1px solid var(--r);border-radius:4px}
.lbtn{width:100%;background:var(--a);color:#000;font-family:var(--dp);font-size:20px;letter-spacing:2px;padding:12px;border:none;border-radius:6px;cursor:pointer;transition:all .2s;margin-top:4px}.lbtn:hover{background:var(--tx)}

/* ═══════════════ APP SHELL ═══════════════ */
#AS{display:none;width:100%;height:100vh;position:relative}#AS.on{display:block}

/* ─ Sidebar ─ */
.sb{position:fixed;left:0;top:0;bottom:0;width:var(--sw);background:var(--panel);border-right:1px solid var(--bd);display:flex;flex-direction:column;z-index:200;transition:transform .3s cubic-bezier(.22,1,.36,1),background .3s,border-color .25s}
.sb-logo{padding:15px 14px 12px;border-bottom:1px solid var(--bd);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.sb-logo-t{font-family:var(--dp);font-size:22px;letter-spacing:2px;color:var(--a)}.sb-logo-s{font-family:var(--mn);font-size:8px;color:var(--mt);letter-spacing:2px;text-transform:uppercase}
/* Alfa Control home link */
.qc-home-link{font-family:var(--dp);font-size:clamp(15px,3vw,20px);letter-spacing:2px;color:var(--a);text-decoration:none;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:opacity .2s;user-select:none}
.qc-home-link:hover{opacity:.75}
.topbar-sep{width:1px;height:22px;background:var(--bd2);flex-shrink:0;margin:0 4px}
.back-btn{display:none;background:none;border:1px solid var(--bd2);color:var(--mt2);font-family:var(--mn);font-size:10px;letter-spacing:1px;padding:5px 10px;border-radius:5px;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
.back-btn:hover{border-color:var(--a);color:var(--a)}
.back-btn.visible{display:flex;align-items:center;gap:4px}
.sb-close{display:none;background:none;border:none;color:var(--mt);font-size:20px;cursor:pointer;padding:4px;line-height:1}
.uch{margin:10px 10px 0;padding:8px 10px;background:var(--s1);border:1px solid var(--bd2);border-radius:6px;display:flex;align-items:center;gap:8px;flex-shrink:0;min-width:0}
.uav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--dp);font-size:13px;flex-shrink:0}
.unm{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.url{font-family:var(--mn);font-size:9px;letter-spacing:1px;text-transform:uppercase}
.sbsr{padding:8px 9px 5px;flex-shrink:0;position:relative}
.sbox{display:flex;align-items:center;gap:5px;background:var(--s1);border:1px solid var(--bd2);border-radius:5px;padding:6px 9px;transition:border-color .2s}.sbox:focus-within{border-color:var(--a)}
.sinp{background:none;border:none;color:var(--tx);font-family:var(--mn);font-size:10px;outline:none;width:100%}.sinp::placeholder{color:var(--mt)}
#SR{position:absolute;top:100%;left:9px;right:9px;z-index:80;background:var(--panel);border:1px solid var(--bd2);border-radius:5px;display:none;max-height:180px;overflow-y:auto;box-shadow:0 8px 20px var(--sh)}
.sri{padding:7px 10px;cursor:pointer;border-bottom:1px solid var(--bd);font-size:11px;transition:background .15s}.sri:last-child{border-bottom:none}.sri:hover{background:var(--ad)}.src{font-family:var(--mn);font-size:11px;color:var(--a)}.srs{font-family:var(--mn);font-size:10px;color:var(--mt);margin-top:1px}
.nsl{font-family:var(--mn);font-size:10px;letter-spacing:3px;color:var(--mt);text-transform:uppercase;padding:9px 13px 3px;flex-shrink:0}
.nsc{flex:1;overflow-y:auto;padding-bottom:8px}
.ng{}.ngh{display:flex;align-items:center;gap:6px;padding:7px 11px;cursor:pointer;border-radius:4px;margin:0 4px;transition:background .15s;user-select:none}.ngh:hover{background:var(--s1)}.ngh.ag{background:var(--ad);border-left:2px solid var(--a);margin-left:4px;padding-left:9px}
.ngi{font-size:14px;width:17px;text-align:center;flex-shrink:0}.ngn{font-size:12px;font-weight:600;flex:1;line-height:1.2}.ngc{font-family:var(--mn);font-size:10px;color:var(--mt);flex-shrink:0}.ngar{font-size:9px;color:var(--mt);transition:transform .2s;flex-shrink:0}.ng.op .ngar{transform:rotate(90deg)}
.nsub{display:none;padding-left:3px}.ng.op .nsub{display:block}
.nsi{display:flex;align-items:center;gap:5px;padding:6px 9px 6px 24px;cursor:pointer;border-radius:4px;margin:0 4px;font-size:12px;color:var(--mt2);transition:all .15s;position:relative}.nsi::before{content:'';position:absolute;left:13px;width:3px;height:3px;border-radius:50%;background:var(--bd2)}.nsi:hover{color:var(--tx);background:var(--s1)}.nsi.ac{color:var(--a);background:var(--ad)}.nsi.ac::before{background:var(--a)}
.nsic{font-family:var(--mn);font-size:10px;color:var(--bd2);margin-left:auto;flex-shrink:0}.nsi.ac .nsic{color:rgba(240,180,41,.3)}
.sb-badge{background:var(--rd);color:var(--r);font-family:var(--mn);font-size:8px;padding:2px 5px;border-radius:8px;margin-left:auto;flex-shrink:0}
.sbft{padding:8px 9px;border-top:1px solid var(--bd);flex-shrink:0}.logbtn{width:100%;background:none;border:1px solid var(--bd2);color:var(--mt);font-family:var(--mn);font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:7px;border-radius:4px;cursor:pointer;transition:all .2s}.logbtn:hover{border-color:var(--r);color:var(--r)}

/* Sidebar overlay (mobile) */
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:190}

/* ─ Main ─ */
.main{margin-left:var(--sw);height:100vh;display:flex;flex-direction:column;overflow:hidden;transition:margin-left .3s}
.topbar{display:flex;align-items:center;gap:10px;padding:0 18px;height:var(--topH);background:var(--panel);border-bottom:1px solid var(--bd);flex-shrink:0;transition:background .3s,border-color .25s}
.ham{display:none;background:none;border:none;color:var(--tx);font-size:22px;cursor:pointer;padding:4px;margin-right:4px;line-height:1;flex-shrink:0}
.tb-titles{flex:1;min-width:0}
.tbbc{font-family:var(--mn);font-size:10px;color:var(--mt);letter-spacing:1px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbtt{font-family:var(--dp);font-size:20px;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.1}
.tbdate{font-family:var(--mn);font-size:12px;color:var(--mt);background:var(--s1);border:1px solid var(--bd);padding:4px 9px;border-radius:4px;white-space:nowrap;flex-shrink:0}
@media(max-width:768px){.tbdate{display:none}}
.ct{flex:1;overflow-y:auto;padding:16px;transition:padding .2s}
@media(max-width:640px){.ct{padding:10px}}

/* ═══════════════ RESPONSIVE SIDEBAR ═══════════════ */
@media(max-width:900px){
  .sb{transform:translateX(-100%);box-shadow:4px 0 20px var(--sh)}
  .sb.open{transform:translateX(0)}
  .sb-close{display:block}
  .sb-overlay.open{display:block}
  .main{margin-left:0}
  .ham{display:block}
  .thbtn{top:9px;right:10px}
}

/* ═══════════════ VIEWS ═══════════════ */
.view{display:none}.view.on{display:block}

/* ─ Welcome ─ */
.wv{height:calc(100vh - var(--topH));display:flex;align-items:center;justify-content:center;text-align:center}
.wbig{font-family:var(--dp);font-size:clamp(60px,12vw,100px);color:var(--bd2);letter-spacing:4px}
.wtxt{font-family:var(--mn);font-size:11px;color:var(--mt);margin-top:10px;letter-spacing:2px}

/* ═══════════════ SHARED COMPONENTS ═══════════════ */
.vhdr{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.vtitle{font-family:var(--dp);font-size:clamp(20px,4vw,26px);letter-spacing:2px}.vsub{font-family:var(--mn);font-size:9px;color:var(--mt);margin-top:2px}
.btn{display:inline-flex;align-items:center;gap:5px;font-family:var(--mn);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:7px 13px;border-radius:5px;cursor:pointer;transition:all .2s;white-space:nowrap;border:none}
.btn-a{background:var(--a);color:#000}.btn-a:hover{background:var(--tx)}
.btn-g{background:var(--g);color:#000}.btn-g:hover{background:var(--tx)}
.btn-r{background:var(--rd);color:var(--r);border:1px solid var(--r)}.btn-r:hover{background:var(--r);color:#fff}
.btn-o{background:none;border:1px solid var(--bd2);color:var(--mt2)}.btn-o:hover{border-color:var(--a);color:var(--a)}
.btn-sm{padding:5px 10px;font-size:9px}
.inp,.sel{background:var(--ib);border:1px solid var(--bd2);color:var(--tx);font-family:var(--mn);font-size:13px;padding:8px 10px;border-radius:5px;outline:none;transition:border-color .2s,background .3s;width:100%;-webkit-appearance:none}
.inp:focus,.sel:focus{border-color:var(--a)}.inp:disabled{opacity:.4;cursor:default}.sel option{background:var(--s1)}
.lbl{font-family:var(--mn);font-size:10px;letter-spacing:2px;color:var(--mt);text-transform:uppercase;display:block;margin-bottom:4px}
.card{background:var(--panel);border:1px solid var(--bd);border-radius:7px;overflow:hidden;transition:background .3s}
.divider{height:1px;background:var(--bd);margin:12px 0}

/* Table */
.tbl{background:var(--panel);border:1px solid var(--bd);border-radius:7px;overflow:hidden;overflow-x:auto}
.tr{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--bd);gap:8px;transition:background .15s;min-width:max-content}
.tr:last-child{border-bottom:none}.tr:hover:not(.th){background:var(--s1)}.th{background:var(--s2);pointer-events:none}
.th span{font-family:var(--mn);font-size:10px;letter-spacing:2px;color:var(--mt);text-transform:uppercase}.tr:not(.th) span{font-size:10px;font-family:var(--mn)}
.tc{flex-shrink:0}

/* Chip */
.chip{font-family:var(--mn);font-size:10px;padding:3px 8px;border-radius:10px;white-space:nowrap;display:inline-flex;align-items:center;gap:3px}
.ch-ok{background:var(--gd);color:var(--g);border:1px solid rgba(14,207,130,.25)}
.ch-ng{background:var(--rd);color:var(--r);border:1px solid rgba(255,68,85,.25)}
.ch-p{background:rgba(90,99,128,.12);color:var(--mt);border:1px solid var(--bd2)}
.ch-a{background:var(--ad);color:var(--a);border:1px solid rgba(240,180,41,.25)}
.ch-b{background:rgba(77,171,247,.1);color:var(--b);border:1px solid rgba(77,171,247,.25)}

/* Tag */
.tag{display:inline-flex;align-items:center;gap:3px;background:var(--rd);border:1px solid rgba(255,68,85,.25);color:var(--r);font-family:var(--mn);font-size:9px;padding:3px 7px;border-radius:10px;margin:2px}
.tagx{cursor:pointer;opacity:.6;font-size:11px;line-height:1;transition:opacity .15s}.tagx:hover{opacity:1}

/* ═══════════════ DASHBOARD ═══════════════ */
.db-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
@media(max-width:900px){.db-kpis{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.db-kpis{grid-template-columns:1fr 1fr}}
.kpi{background:var(--panel);border:1px solid var(--bd);border-radius:7px;padding:14px 16px;transition:background .3s}
.kpi-v{font-family:var(--dp);font-size:clamp(28px,4vw,36px);line-height:1}.kpi-l{font-family:var(--mn);font-size:8px;color:var(--mt);letter-spacing:2px;text-transform:uppercase;margin-top:2px}.kpi-s{font-family:var(--mn);font-size:9px;color:var(--mt2);margin-top:4px}
.db-charts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
@media(max-width:768px){.db-charts{grid-template-columns:1fr}}
.db-charts3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:900px){.db-charts3{grid-template-columns:1fr 1fr}}
@media(max-width:580px){.db-charts3{grid-template-columns:1fr}}
.chart-card{background:var(--panel);border:1px solid var(--bd);border-radius:7px;padding:14px;transition:background .3s}
.chart-lbl{font-family:var(--mn);font-size:8px;letter-spacing:2px;color:var(--mt);text-transform:uppercase;margin-bottom:10px}

/* ═══════════════ PARTS ADMIN ═══════════════ */
.parts-tbl-wrap{overflow-x:auto}
.parts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
@media(max-width:640px){.parts-grid{grid-template-columns:1fr}}

/* ═══════════════ PART EDITOR ═══════════════ */
.peditor{background:var(--panel);border:1px solid var(--bd2);border-radius:10px;padding:24px;width:780px;max-width:97vw;max-height:92vh;overflow-y:auto;transform:scale(.9);transition:transform .3s,background .3s}
.ovl.on .peditor{transform:scale(1)}
.pe2g{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
@media(max-width:600px){.pe2g{grid-template-columns:1fr}}
.pe2f{grid-column:1/-1}
.pe-mhdr{font-family:var(--mn);font-size:8px;letter-spacing:2px;color:var(--mt);text-transform:uppercase;margin:10px 0 4px}
/* measure row: name | spec | unit | freq | method | img | del */
.pe-mrow{display:grid;grid-template-columns:2fr 1fr 70px 52px 1fr 30px 28px;gap:4px;align-items:center;margin-bottom:5px;background:var(--s1);border:1px solid var(--bd);border-radius:5px;padding:6px 8px}
@media(max-width:640px){.pe-mrow{grid-template-columns:1fr 1fr;gap:4px}}
.msel{background:var(--ib);border:1px solid var(--bd2);color:var(--tx);font-family:var(--mn);font-size:10px;padding:6px 7px;border-radius:4px;outline:none;width:100%}.msel option{background:var(--s1)}.msel:focus{border-color:var(--a)}
.peinp,.pesel{background:var(--ib);border:1px solid var(--bd2);color:var(--tx);font-family:var(--mn);font-size:11px;padding:7px 9px;border-radius:5px;outline:none;width:100%;transition:border-color .2s}.peinp:focus,.pesel:focus{border-color:var(--a)}.pesel option{background:var(--s1)}
/* measure image thumb in editor */
.mith{width:28px;height:28px;border-radius:3px;background:var(--s2);border:1px dashed var(--bd2);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:all .2s;flex-shrink:0}.mith img{width:100%;height:100%;object-fit:cover;border-radius:2px}.mith:hover{border-color:var(--a)}

/* ═══════════════ REF LISTS ═══════════════ */
.ref-tabs{display:flex;gap:0;background:var(--s2);border:1px solid var(--bd);border-radius:6px;overflow:hidden;margin-bottom:14px;overflow-x:auto}
.ref-tab{flex:1;text-align:center;padding:8px 6px;font-family:var(--mn);font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s;color:var(--mt2);white-space:nowrap;min-width:80px}.ref-tab.a{background:var(--ad);color:var(--a);border-bottom:2px solid var(--a)}
.rs{display:none}.rs.a{display:block}
.ref-list{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.ref-item{display:flex;align-items:center;gap:8px;padding:7px 11px;background:var(--panel);border:1px solid var(--bd);border-radius:5px}
.ref-add-row{display:flex;gap:6px;flex-wrap:wrap}
@media(max-width:480px){.ref-add-row{flex-direction:column}}

/* ═══════════════ INSPECTION ═══════════════ */
.sv-stats{display:flex;gap:12px;flex-shrink:0;flex-wrap:wrap}
.stb{text-align:center;min-width:44px}.stv{font-family:var(--dp);font-size:clamp(20px,4vw,26px);line-height:1}.stl{font-family:var(--mn);font-size:7px;color:var(--mt);letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.vok{color:var(--g)}.vfl{color:var(--r)}.vac{color:var(--a)}
.prog{height:3px;background:var(--bd);border-radius:2px;margin-bottom:12px;overflow:hidden}.progf{height:100%;background:var(--a);transition:width .4s ease}
.pw{display:flex;flex-direction:column;gap:10px}
.pc{background:var(--panel);border:1px solid var(--bd);border-radius:7px;overflow:hidden;transition:background .3s}
.pch{display:flex;align-items:center;gap:9px;padding:10px 13px;background:var(--s2);border-bottom:1px solid var(--bd);cursor:pointer;user-select:none;transition:background .15s}.pch:hover{background:var(--s1)}

const API_URL = 'https://script.google.com/macros/s/AKfycbynP2zNcYD8G2s-I3ObMCx_Ty9ZpKYwp-mr8sUnP7mXexOOmDPZByDdTViXDpR7eUxC/exec';
let API_TOKEN = LS.get('q6_api_token', null);

async function apiGet(action, params = {}) {
  const url = new URL(API_URL);
  url.searchParams.set('action', action);
  if (API_TOKEN) url.searchParams.set('token', API_TOKEN);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString());
  return res.json();
}

async function apiPost(action, data = {}) {
  const res = await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify({ action, token: API_TOKEN, ...data })
  });
  return res.json();
}

/* Ma'lumotlarni Sheets dan yuklab localStorage ga saqlash */
async function syncFromSheets() {
  try {
    showSyncStatus('⏳ Ma\'lumotlar yuklanmoqda...');
    const [users, catalog, parts, machines, workers, andons, production, inspection, ftq, scrap, processes] = await Promise.all([
      apiGet('getUsers'),
      apiGet('getCatalog'),
      apiGet('getParts'),
      apiGet('getMachines'),
      apiGet('getWorkers'),
      apiGet('getAndons'),
      apiGet('getProduction'),
      apiGet('getInspection', { limit: 200 }),
      apiGet('getFTQ', { limit: 200 }),
      apiGet('getScrap'),
      apiGet('getProcesses'),
    ]);

    if (Array.isArray(users))      { LS.set('q6_users', users.map(u => ({...u, id: u.login, pass: u.hashed_pw, perms: tryParseArr(u.perms)}))); }
    if (Array.isArray(catalog))    { LS.set('q6_catalog', catalog.map(c => ({...c, subParts: tryParseArr(c.subParts)}))); }
    if (Array.isArray(parts))      { LS.set('q6_parts', parts.map(p => ({...p, measures: tryParseArr(p.measures)}))); }
    if (Array.isArray(machines))   { LS.set('q6_machines', machines); }
    if (Array.isArray(workers))    { LS.set('q6_workers', workers); }
    if (Array.isArray(andons))     { LS.set('q6_andons', andons.map(a => ({...a, subParts: tryParseArr(a.subParts)}))); }
    if (Array.isArray(production)) { LS.set('q6_prodplans', production.map(p => ({...p, stops: tryParseArr(p.stopReasons), stopType: p.stopType, fact: p.factQty, plan: p.planQty, code: p.partCode, name: p.partName}))); }
    if (Array.isArray(inspection)) { LS.set('q6_insph', inspection.map(r => ({...r, measureData: tryParseArr(r.measureData)}))); }
    if (Array.isArray(ftq))        { LS.set('q6_ftqh', ftq.map(r => ({...r, entries: tryParseArr(r.entries)}))); }
    if (Array.isArray(scrap))      { LS.set('q6_scrap', scrap.map(s => ({...s, approvals: tryParseArr(s.approvals)}))); }
    if (Array.isArray(processes))  {
      const procMap = {};
      processes.forEach(p => {
        if (!procMap[p.partCode]) procMap[p.partCode] = [];
        procMap[p.partCode][parseInt(p.stepIndex)||0] = { name: p.name, machineId: p.machineId, cycleTime: parseFloat(p.cycleTime)||0, note: p.note||'' };
      });
      LS.set('q6_processes', procMap);
    }
    showSyncStatus('✅ Yuklandi');
    setTimeout(() => hideSyncStatus(), 2000);
    buildNav();
  } catch(e) {
    showSyncStatus('⚠️ Offline rejim');
    setTimeout(() => hideSyncStatus(), 3000);
  }
}

function tryParseArr(val) {
  if (Array.isArray(val)) return val;
  if (!val) return [];
  try { return JSON.parse(val); } catch(e) { return []; }
}

function showSyncStatus(msg) {
  let el = document.getElementById('syncStatus');
  if (!el) {
    el = document.createElement('div');
    el.id = 'syncStatus';
    el.style.cssText = 'position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--bd2);border-radius:20px;padding:6px 16px;font-family:var(--mn);font-size:11px;color:var(--tx);z-index:9999;box-shadow:0 4px 12px var(--sh)';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.display = 'block';
}
function hideSyncStatus() {
  const el = document.getElementById('syncStatus');
  if (el) el.style.display = 'none';
}

async function doLogin() {
  const uid = document.getElementById('lUser').value.trim();
  const pw  = document.getElementById('lPass').value.trim();
  const err = document.getElementById('lErr');
  const btn = document.querySelector('#LS button[onclick*="doLogin"]') || document.querySelector('#LS .lbtn');

  if (!uid || !pw) { err.style.display='block'; err.textContent='❌ Login va parol kiriting!'; return; }
  err.style.display = 'none';
  if (btn) { btn.textContent = '⏳ Kirilmoqda...'; btn.disabled = true; }

  try {
    const res = await apiPost('login', { login: uid, password: pw });
    if (res.ok) {
      API_TOKEN = res.token;
      LS.set('q6_api_token', API_TOKEN);
      // User ob'ektini localStorage formatga o'tkazish
      CU = { id: res.user.login, login: res.user.login, name: res.user.name, role: res.user.role, color: res.user.color, perms: res.user.perms, pass: pw };
      initApp();
      // Fonda ma'lumotlarni yuklash
      syncFromSheets();
    } else {
      err.style.display = 'block';
      err.textContent = '❌ ' + (res.error || 'Login yoki parol noto\'g\'ri!');
    }
  } catch(e) {
    // Offline — localStorage dan login
    USERS = getUsers();
    const u = USERS.find(x => (x.login === uid || x.id === uid) && (x.pass === pw || x.hashed_pw === pw));
    if (u) {
      CU = u;
      err.style.display = 'none';
      initApp();
      showSyncStatus('⚠️ Offline rejim');
      setTimeout(() => hideSyncStatus(), 3000);
    } else {
      err.style.display = 'block';
      err.textContent = '❌ Foydalanuvchi topilmadi (offline)';
    }
  } finally {
    if (btn) { btn.textContent = 'KIRISH'; btn.disabled = false; }
  }
}

/* Returns {partCode: true/false} — true means needs attention (not enough checks) */
/* Returns true if current user has permission for given menu key.
   Always reads fresh from localStorage so admin changes take effect immediately. */
function hasPerm(key){
  if(!CU)return false;
  if(CU.role==='admin')return true; // admin always sees everything
  // Get FRESH user data from storage (admin may have changed perms)
  const freshUser=getUsers().find(u=>u.id===CU.id);
  const perms=freshUser?.perms||CU.perms||['all'];
  return perms.includes('all')||perms.includes(key);
}

function getFreqAlerts(parts,todayPlans){
  const result={};
  const planCodes=new Set(todayPlans.map(p=>p.code));
  const todayInsp=G.inspH().filter(r=>r.date===curDate());
  parts.forEach(part=>{
    if(!planCodes.has(part.code))return;// only alert for parts in today's plan
    const freq=part.checkFreq||1;
    const done=todayInsp.filter(r=>r.code===part.code).length;
    result[part.code]=done<freq;// alert if fewer checks than required
  });
  return result;
}

function buildNav(){
  const nav=document.getElementById('navMenu');nav.innerHTML='';
  const parts=G.parts();const uch=G.uch();
  const ML=G.menuLabels();

  // Get fresh perms for current user
  const freshUser=CU?getUsers().find(u=>u.id===CU.id):null;
  const curPerms=freshUser?.perms||CU?.perms||['all'];
  const isAdmin=CU?.role==='admin';

  // Helper — check permission using fresh data
  const can=(key)=>{
    if(!CU)return false;
    if(isAdmin)return true;
    return curPerms.includes('all')||curPerms.includes(key);
  };

  const pendScrap=G.scrapH().filter(s=>s.status==='pending').length;
  const todayPlans=G.prodPlans().filter(p=>p.date===curDate());
  const freqAlerts=getFreqAlerts(parts,todayPlans);
  const alertCount=Object.values(freqAlerts).filter(v=>v).length;

  if(can('dashboard'))
    nav.appendChild(niK('📊',ML.dashboard||'Dashboard','','openDashboard()'));

  if(can('sections')){
    const secGrp=ng2('🏭',ML.sections||'Mahsulot tekshiruvi');
    uch.forEach(sec=>{
      const sp=parts.filter(p=>p.secId===sec.id);
      const sgrp=ng2(sec.icon,sec.name,sp.length,true);
      sp.forEach(p=>{
        const hasAlert=freqAlerts[p.code];

/* Nom olish: avval katalogdan, keyin parts dan */
function getPartName(code){
  return G.catalog().find(c=>c.code===code)?.name || G.parts().find(p=>p.code===code)?.name || code;
}
function getCatalogOrPart(code){
  const cat=G.catalog().find(c=>c.code===code);
  const part=G.parts().find(p=>p.code===code);
  return cat||part||null;
}

function doSearch(v){
  const box=document.getElementById('SR');
  if(!v.trim()){box.style.display='none';return}
  const q=v.toLowerCase();
  // Katalog + parts dan qidirish (Mahsulot tekshiruvi uchun)
  const catRes=G.catalog().filter(c=>c.code.toLowerCase().includes(q)||c.name.toLowerCase().includes(q));
  const partRes=G.parts().filter(p=>p.code.toLowerCase().includes(q)||p.name.toLowerCase().includes(q));
  // Combine: catalog first, then parts not in catalog
  const seen=new Set(catRes.map(c=>c.code));
  const res=[...catRes,...partRes.filter(p=>!seen.has(p.code))].slice(0,8);
  if(!res.length){box.style.display='none';return}
  box.style.display='block';
  box.innerHTML=res.map(p=>`
    <div class="sri" onmousedown="openSectionFromSearch('${p.secId}','${p.code}')">
      <div class="src">${p.code}</div>
      <div>${p.name}</div>
      <div class="srs">${G.uch().find(s=>s.id===p.secId)?.name||p.secId}</div>
    </div>`).join('');
}
function openSectionFromSearch(secId,code){
  document.getElementById('sInp').value='';
  document.getElementById('SR').style.display='none';
  closeSb();
  // Open section then scroll to specific part
  CS=secId;
  const uch=G.uch();const sec=uch.find(u=>u.id===secId);
  const parts=G.parts().filter(p=>p.secId===secId);
  if(!PS[secId])PS[secId]={};
  parts.forEach(p=>{if(!PS[secId][p.code])PS[secId][p.code]={measures:{},time:curTime(),date:curDate(),smena:'kunduzgi',saved:false}});
  setTop('Uchastkalar',sec?.name||secId);showV('SV');
  const canEdit=hasPerm('sections');
  renderSV(sec,parts,canEdit);updateSVStats(secId,parts);
  setTimeout(()=>{
    document.getElementById('pc_'+code)?.scrollIntoView({behavior:'smooth',block:'start'});
    const c=document.getElementById('pcard_'+code);if(c?.classList.contains('col'))c.classList.remove('col');
    document.querySelectorAll('.nsi').forEach(x=>x.classList.remove('ac'));
    document.getElementById('ni_'+code)?.classList.add('ac');
  },150);
}

let viewHistory=[];
function showV(id){
  const prev=document.querySelector('.view.on')?.id;
  if(prev&&prev!==id) viewHistory.push(prev);
  if(viewHistory.length>10) viewHistory=viewHistory.slice(-10);
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById(id)?.classList.add('on');
  // show/hide back button
  const bb=document.getElementById('backBtn');
  if(bb) bb.classList.toggle('visible', viewHistory.length>0&&id!=='WV');
}
function setTop(bc,tt){
  document.getElementById('tbBc').textContent=bc;
  document.getElementById('tbTt').textContent=tt;
}
function goBack(){
  if(!viewHistory.length){showV('WV');setTop('','');return}
  const prev=viewHistory.pop();
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById(prev)?.classList.add('on');
  const bb=document.getElementById('backBtn');
  if(bb) bb.classList.toggle('visible', viewHistory.length>0);
}

let dbDateFrom='', dbDateTo='';

function openDashboard(){setTop('Boshqaruv','Dashboard');showV('DBV');renderDashboard()}

function filterFTQByDate(ftqH, from, to){
  if(!from&&!to) return ftqH;
  return ftqH.filter(rec=>{
    // check record-level ts and also entry-level dates
    const recDate=new Date(rec.ts).toISOString().split('T')[0];
    const entryDates=(rec.entries||[]).map(e=>e.date||recDate);
    const allDates=[recDate,...entryDates];
    return allDates.some(d=>(!from||d>=from)&&(!to||d<=to));
  });
}

        <button onclick="dbDateFrom='';dbDateTo='';renderDashboard()" style="background:none;border:1px solid var(--bd2);color:var(--mt2);font-family:var(--mn);font-size:9px;padding:5px 10px;border-radius:4px;cursor:pointer;transition:all .2s" onmouseover="this.style.borderColor='var(--a)'" onmouseout="this.style.borderColor='var(--bd2)'">Tozalash</button>
        ${dbDateFrom||dbDateTo?`<span class="chip ch-a" style="font-size:8px">${dbDateFrom||'∞'} → ${dbDateTo||'∞'}</span>`:'<span class="chip ch-p" style="font-size:8px">Barcha vaqt</span>'}

      <div class="kpi"><div class="kpi-v" style="color:var(--r)">${ng2t.toLocaleString()}</div><div class="kpi-l">Nuqsonlar (NG)</div><div class="kpi-s">Jami rad etilgan</div></div>
      <div class="kpi"><div class="kpi-v" style="color:var(--b)">${ppm.toLocaleString()}</div><div class="kpi-l">PPM</div><div class="kpi-s">Parts per million</div></div>
      <div class="kpi"><div class="kpi-v" style="color:var(--p)">${rw+sc}</div><div class="kpi-l">Rework + Scrap</div><div class="kpi-s">Rework: ${rw} · Scrap: ${sc}</div></div>

    </div>`;
  setTimeout(()=>drawDB(ftqH,filtPlans),50);

function drawDB(ftqH,filtPlans){
  Object.values(dbChartObjs).forEach(c=>{try{c.destroy()}catch(e){}});dbChartObjs={};
  const c=cc();Chart.defaults.color=c.mt;Chart.defaults.font.family='"JetBrains Mono",monospace';Chart.defaults.font.size=10;

  // CH1: monthly FTQ
  const mon={};ftqH.forEach(e=>{const d=new Date(e.ts);const k=(d.getMonth()+1)+'/'+d.getFullYear().toString().slice(2);if(!mon[k])mon[k]={ok:0,tot:0};e.entries?.forEach(r=>{const o=parseInt(r.ok)||0;const n=(r.ngItems||[]).reduce((s,i)=>s+(parseInt(i.cnt)||0),0);mon[k].ok+=o;mon[k].tot+=o+n})});
  const mk=Object.keys(mon).slice(-6);
  dbChartObjs.c1=new Chart(document.getElementById('ch1'),{type:'line',data:{labels:mk,datasets:[{data:mk.map(k=>mon[k].tot>0?+((mon[k].ok/mon[k].tot)*100).toFixed(1):null),borderColor:'#0ecf82',backgroundColor:'rgba(14,207,130,.08)',tension:.4,fill:true,pointBackgroundColor:'#0ecf82',pointRadius:3}]},options:{plugins:{legend:{display:false}},scales:{y:{min:0,max:100,grid:{color:c.g},ticks:{color:c.mt}},x:{grid:{display:false},ticks:{color:c.mt}}}}});

  // CH2: daily NG
  const day={};ftqH.forEach(e=>{const d=new Date(e.ts);const k=d.getDate()+'/'+(d.getMonth()+1);if(!day[k])day[k]=0;e.entries?.forEach(r=>{day[k]+=(r.ngItems||[]).reduce((s,i)=>s+(parseInt(i.cnt)||0),0)})});
  const dk=Object.keys(day).slice(-10);
  dbChartObjs.c2=new Chart(document.getElementById('ch2'),{type:'bar',data:{labels:dk,datasets:[{data:dk.map(k=>day[k]),backgroundColor:'rgba(255,68,85,.65)',borderColor:'#ff4455',borderWidth:1,borderRadius:3}]},options:{plugins:{legend:{display:false}},scales:{y:{grid:{color:c.g},ticks:{color:c.mt}},x:{grid:{display:false},ticks:{color:c.mt}}}}});

  // CH3: NG types doughnut
  const ngt={};ftqH.forEach(e=>e.entries?.forEach(r=>(r.ngItems||[]).forEach(i=>{if(i.type&&i.cnt)ngt[i.type]=(ngt[i.type]||0)+(parseInt(i.cnt)||0)})));
  const ntk=Object.keys(ngt).slice(0,6);const pal=['#ff4455','#f0b429','#4dabf7','#0ecf82','#9b8afb','#ff8c00'];
  if(ntk.length){dbChartObjs.c3=new Chart(document.getElementById('ch3'),{type:'doughnut',data:{labels:ntk,datasets:[{data:ntk.map(k=>ngt[k]),backgroundColor:pal,borderWidth:0}]},options:{plugins:{legend:{position:'bottom',labels:{color:c.mt,padding:6,font:{size:9}}}},cutout:'62%'}});}

  // CH4: rework/scrap
  let rwt=0,sct=0;ftqH.forEach(e=>e.entries?.forEach(r=>{rwt+=parseInt(r.rework)||0;sct+=parseInt(r.scrap)||0}));
  dbChartObjs.c4=new Chart(document.getElementById('ch4'),{type:'bar',data:{labels:['Rework','Scrap'],datasets:[{data:[rwt,sct],backgroundColor:['rgba(77,171,247,.65)','rgba(155,138,251,.65)'],borderColor:['#4dabf7','#9b8afb'],borderWidth:1,borderRadius:4}]},options:{plugins:{legend:{display:false}},scales:{y:{grid:{color:c.g},ticks:{color:c.mt}},x:{grid:{display:false},ticks:{color:c.mt}}}}});

  // CH6: Plan vs Fact by part (top 8 by plan volume)
  const byPart={};filtPlans.forEach(p=>{if(!byPart[p.code])byPart[p.code]={code:p.code,name:p.name,plan:0,fact:0};byPart[p.code].plan+=parseInt(p.plan)||0;if(p.fact!==undefined&&p.fact!=='')byPart[p.code].fact+=parseInt(p.fact)||0;});
  const partKeys=Object.keys(byPart).sort((a,b)=>byPart[b].plan-byPart[a].plan).slice(0,8);
  if(partKeys.length){
    dbChartObjs.c6=new Chart(document.getElementById('ch6'),{type:'bar',data:{labels:partKeys.map(k=>byPart[k].code),datasets:[{label:'Reja',data:partKeys.map(k=>byPart[k].plan),backgroundColor:'rgba(240,180,41,.6)',borderColor:'#f0b429',borderWidth:1,borderRadius:3},{label:'Fakt',data:partKeys.map(k=>byPart[k].fact),backgroundColor:'rgba(14,207,130,.6)',borderColor:'#0ecf82',borderWidth:1,borderRadius:3}]},options:{plugins:{legend:{position:'top',labels:{color:c.mt,padding:8,font:{size:9}}}},scales:{y:{grid:{color:c.g},ticks:{color:c.mt}},x:{grid:{display:false},ticks:{color:c.mt,maxRotation:40}}}}});
  }

  // CH7: Daily plan vs fact trend (last 10 days)
  const byDay={};filtPlans.forEach(p=>{const d=p.date;if(!byDay[d])byDay[d]={plan:0,fact:0};byDay[d].plan+=parseInt(p.plan)||0;if(p.fact!==undefined&&p.fact!=='')byDay[d].fact+=parseInt(p.fact)||0;});
  const dayKeys=Object.keys(byDay).sort().slice(-10);
  if(dayKeys.length){
    dbChartObjs.c7=new Chart(document.getElementById('ch7'),{type:'line',data:{labels:dayKeys.map(d=>d.slice(5)),datasets:[{label:'Reja',data:dayKeys.map(d=>byDay[d].plan),borderColor:'#f0b429',backgroundColor:'rgba(240,180,41,.05)',tension:.3,pointBackgroundColor:'#f0b429',pointRadius:3,fill:false},{label:'Fakt',data:dayKeys.map(d=>byDay[d].fact),borderColor:'#0ecf82',backgroundColor:'rgba(14,207,130,.05)',tension:.3,pointBackgroundColor:'#0ecf82',pointRadius:3,fill:false}]},options:{plugins:{legend:{position:'top',labels:{color:c.mt,padding:8,font:{size:9}}}},scales:{y:{grid:{color:c.g},ticks:{color:c.mt}},x:{grid:{display:false},ticks:{color:c.mt}}}}});
  }

  // CH8: Stop types doughnut (Q/P/M)
  const stopData={Q:0,P:0,M:0};filtPlans.forEach(p=>{if(p.stopType&&stopData[p.stopType]!==undefined)stopData[p.stopType]++});
  const stopTotal=stopData.Q+stopData.P+stopData.M;
  if(stopTotal){
    dbChartObjs.c8=new Chart(document.getElementById('ch8'),{type:'doughnut',data:{labels:['Q — Sifat','P — Ishlab chiqarish','M — Texnik'],datasets:[{data:[stopData.Q,stopData.P,stopData.M],backgroundColor:['#ff4455','#f0b429','#9b8afb'],borderWidth:0}]},options:{plugins:{legend:{position:'bottom',labels:{color:c.mt,padding:6,font:{size:9}}}},cutout:'60%'}});
  }
}

function peCatalogSearch(val){
  const dd=document.getElementById('peCatalogDd');
  if(!val||val.trim().length<2){dd.style.display='none';return}
  const q=val.trim().toLowerCase();
  const cat=G.catalog();
  const res=cat.filter(c=>c.code.toLowerCase().includes(q)||c.name.toLowerCase().includes(q)).slice(0,10);
  if(!res.length){dd.style.display='none';return}

  dd.innerHTML=res.map(c=>`
    <div onmousedown="peCatalogSelect('${c.code.replace(/'/g,"\\'")}','${c.name.replace(/'/g,"\\'")}','${(c.model||'').replace(/'/g,"\\'")}','${c.secId||''}','${c.linId||''}');"

function peCatalogSelect(code,name,model,secId,linId){

function addPeM(m){
  peMIdx++;const i=peMIdx;const div=document.createElement('div');div.className='pe-mrow';div.id='pem_'+i;
  const imgSrc=m?.imgData||'';
  div.innerHTML=`
    <input class="peinp" type="text" placeholder="O'lchov nomi" value="${m?.name||''}">
    <input class="peinp" type="text" placeholder="0.72±0.05" value="${m?.spec||''}">
    <input class="peinp" type="text" placeholder="mm" value="${m?.unit||''}">
    <input class="peinp" type="number" min="1" max="20" placeholder="1" value="${m?.checkFreq||1}" style="text-align:center" title="Smenada necha marta tekshirilsin">
    <select class="msel" title="Tekshiruv metodi">${G.mth().map(t=>`<option value="${t}" ${m?.method===t?'selected':''}>${t}</option>`).join('')}</select>
    <div class="mith" id="mith_${i}" onclick="pickImg('pem',${i})" title="Rasm biriktirish">${imgSrc?`<img src="${imgSrc}" id="mithimg_${i}">`:`<span style="font-size:11px">📷</span>`}</div>
    <button onclick="document.getElementById('pem_${i}').remove()" style="background:none;border:1px solid var(--bd2);color:var(--mt);border-radius:3px;cursor:pointer;padding:4px 6px;font-size:12px;transition:all .15s" onmouseover="this.style.color='var(--r)'" onmouseout="this.style.color='var(--mt)'">✕</button>`;
  document.getElementById('peMeasures').appendChild(div);

function savePart(){
  const code=document.getElementById('peCode').value.trim().toUpperCase();
  const name=document.getElementById('peName').value.trim();
  const model=document.getElementById('peModelInp').value.trim()||document.getElementById('peModel').value.trim();
  const checkFreq=parseInt(document.getElementById('peFreq')?.value)||1;
  if(!code||!name){alert('Detal raqami va nomi majburiy! Katalogdan tanlang yoki to\'g\'ri kiriting.');return}
  const measures=[];
  document.getElementById('peMeasures').querySelectorAll('[id^="pem_"]').forEach((row,i)=>{
    const inps=row.querySelectorAll('input');const sel=row.querySelector('select');const img=row.querySelector('img');
    if(inps[0].value.trim())measures.push({id:'m'+(i+1),name:inps[0].value.trim(),spec:inps[1]?.value.trim()||'',unit:inps[2]?.value.trim()||'',checkFreq:parseInt(inps[3]?.value)||1,method:sel?.value||'',imgData:img?.src||null});
  });
  const parts=G.parts();const ei=parts.findIndex(p=>p.code===code);
  const part={code,name,model,checkFreq,
    secId:document.getElementById('peSec').value||'',
    linId:document.getElementById('peLin')?.value||'',
    measures};
  if(ei>=0)parts[ei]=part;else parts.push(part);
  LS.set('q6_parts',parts);
  apiPost('savePart',{data:{code:part.code,name:part.name,model:part.model||'',secId:part.secId||'',linId:part.linId||'',checkFreq:part.checkFreq,measures:JSON.stringify(part.measures)}}).catch(()=>{});
  document.getElementById('peOvl').classList.remove('on');renderPartsAdmin();buildNav();
}
function delPart(code){if(!confirm(`"${code}" detalni o'chirish?`))return;LS.set('q6_parts',G.parts().filter(p=>p.code!==code));renderPartsAdmin();buildNav()}

  if(!PS[secId])PS[secId]={};
  parts.forEach(p=>{if(!PS[secId][p.code])PS[secId][p.code]={measures:{},time:curTime(),date:curDate(),smena:'kunduzgi',saved:false}});
  setTop('Uchastkalar',sec?.name||secId);showV('SV');
  const canEdit=hasPerm('sections');
  if(!parts.length){document.getElementById('SV').innerHTML=`<div class="vtitle">${sec?.icon||''} ${sec?.name||secId}</div><div class="empty" style="text-align:left;margin-top:12px">Bu uchastkada detallar yo'q. <a href="#" onclick="openPartsAdmin()" style="color:var(--a)">Qo'shish</a></div>`;return}
  renderSV(sec,parts,canEdit);updateSVStats(secId,parts);
}
function renderSV(sec,parts,canEdit){
  const sv=document.getElementById('SV');
  // Get today's production plan for this section's parts
  const todayPlans=G.prodPlans().filter(p=>p.date===curDate());
  const planCodes=new Set(todayPlans.map(p=>p.code));

  sv.innerHTML=`<div style="margin-bottom:12px"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:8px"><div><div class="vtitle">${sec?.icon||''} ${sec?.name||''}</div><div class="vsub">// ${parts.length} ta detal · ${CU.name}</div></div><div class="sv-stats"><div class="stb"><div class="stv vac" id="stT">0</div><div class="stl">JAMI</div></div><div style="width:1px;background:var(--bd)"></div><div class="stb"><div class="stv vok" id="stO">0</div><div class="stl">O'TDI</div></div><div class="stb"><div class="stv vfl" id="stF">0</div><div class="stl">RAD</div></div></div></div><div class="prog"><div class="progf" id="pF"></div></div></div><div class="pw" id="PW"></div>`;
  const pw=document.getElementById('PW');
  parts.forEach((part,pi)=>{
    const ps=PS[CS][part.code]||{};
    const tot=part.measures.length;const done=part.measures.filter(m=>ps.measures?.[m.id]?.verdict).length;const fails=part.measures.filter(m=>ps.measures?.[m.id]?.verdict==='fail').length;
    let bc='bd-p',bt=`—/${tot}`;if(done>0){bt=`${done}/${tot}`;bc=fails>0?'bd-f':'bd-o'}

    const planItem=todayPlans.find(p=>p.code===part.code);
    const planBadge=inPlan?`<span title="Bu detal bugungi ishlab chiqarish rejasida bor" style="font-family:var(--mn);font-size:9px;padding:2px 7px;border-radius:10px;background:rgba(240,180,41,.12);color:var(--a);border:1px solid rgba(240,180,41,.3)">📦 Rejada</span>`:'';

    // Frequency badge — only show for parts in today's production plan
    const freq=part.checkFreq||1;
    const todaySavedCount=G.inspH().filter(r=>r.code===part.code&&r.date===curDate()).length;
    const freqOk=todaySavedCount>=freq;
    const needsAlert=inPlan&&!freqOk;
    // Only show badge if part is in today's plan

        background:${freqOk?'var(--gd)':todaySavedCount>0?'var(--ad)':'var(--rd)'};
        color:${freqOk?'var(--g)':todaySavedCount>0?'var(--a)':'var(--r)'};
        border:1px solid ${freqOk?'rgba(14,207,130,.3)':todaySavedCount>0?'rgba(240,180,41,.3)':'rgba(255,68,85,.3)'};

    const mrows=part.measures.map(m=>{
      const ms=ps.measures?.[m.id]||{};const imgSrc=m.imgData||'';
      return `<tr class="${ms.verdict?'r'+ms.verdict:''}" id="mr_${part.code}_${m.id}">

        <td><div style="display:flex;align-items:center;gap:4px"><input class="ri" type="text" value="${ms.val||''}" placeholder="—" ${!canEdit?'disabled':''} oninput="onV('${CS}','${part.code}','${m.id}',this.value)"><div class="rst ${ms.verdict||''}" id="rs_${part.code}_${m.id}"></div></div></td>

      </tr>`;

    const wrap=document.createElement('div');
    wrap.innerHTML=`<div id="pc_${part.code}"></div><div class="pc" id="pcard_${part.code}" style="${inPlan&&!freqOk?'border-color:var(--r);border-width:2px':''}">

        <div class="mt-wrap"><table class="mt2t">
          <thead><tr>
            <th style="width:32px">№</th><th>Nomi</th>
            <th style="width:90px">Norma</th><th style="width:44px">Birlik</th>
            <th style="width:90px">Rasm / Metod</th><th style="width:100px">Natija</th>
            <th style="width:80px">Holat</th><th>Izoh</th>

        </table></div>
        ${canEdit?`<div class="pcfooter"><span class="pfl">Sana</span><input class="pfdate" type="date" value="${ps.date||curDate()}" oninput="PS['${CS}']['${part.code}'].date=this.value"><span class="pfl">Vaqt</span><input class="pftime" type="time" value="${ps.time||curTime()}" oninput="PS['${CS}']['${part.code}'].time=this.value"><span class="pfl">Smena</span><div class="smch"><div class="sm ${(ps.smena||'kunduzgi')==='kunduzgi'?'s':''}" id="smd_${part.code}" onclick="onSm('${CS}','${part.code}','kunduzgi')">☀️ K</div><div class="sm ${ps.smena==='tungi'?'s':''}" id="smn_${part.code}" onclick="onSm('${CS}','${part.code}','tungi')">🌙 T</div></div><button class="pcsave ${ps.saved?'saved':''}" id="psb_${part.code}" onclick="savePartR('${CS}','${part.code}')">${ps.saved?'✓':'SAQLASH'}</button></div>`:''}
      </div>
    </div>`;
    pw.appendChild(wrap);
  });
}
function togglePC(code){document.getElementById('pcard_'+code)?.classList.toggle('col')}
function ensM(s,c,m){if(!PS[s])PS[s]={};if(!PS[s][c])PS[s][c]={measures:{},time:curTime(),date:curDate(),smena:'kunduzgi',saved:false};if(!PS[s][c].measures[m])PS[s][c].measures[m]={}}

/* Parse spec string into {min,max} or null */
function parseSpec(spec){
  if(!spec)return null;
  const s=spec.toString().trim();
  // "Min X" format
  const minM=s.match(/^[Mm]in\s*([\d.]+)/);if(minM)return{min:parseFloat(minM[1]),max:Infinity};
  // "Max X" format
  const maxM=s.match(/^[Mm]ax\s*([\d.]+)/);if(maxM)return{min:-Infinity,max:parseFloat(maxM[1])};
  // "X±Y" format
  const pm=s.match(/^([\d.]+)\s*[±]\s*([\d.]+)/);if(pm){const c=parseFloat(pm[1]),d=parseFloat(pm[2]);return{min:c-d,max:c+d}}
  // "X–Y" or "X-Y" range (dash/en-dash)
  const rng=s.match(/^([\d.]+)\s*[–\-]\s*([\d.]+)/);if(rng)return{min:parseFloat(rng[1]),max:parseFloat(rng[2])};
  // "≥X"
  const ge=s.match(/^[≥>]=?\s*([\d.]+)/);if(ge)return{min:parseFloat(ge[1]),max:Infinity};
  // "≤X"
  const le=s.match(/^[≤<]=?\s*([\d.]+)/);if(le)return{min:-Infinity,max:parseFloat(le[1])};
  return null;
}

function checkSpec(val,spec,method){
  if(!val||val.trim()==='')return null; // no value yet
  const v=val.toString().trim().toLowerCase();
  // Visual method: ok/ng text
  if(method&&method.toLowerCase()==='vizual'){
    if(v==='ok'||v==='o\'k'||v==='ha'||v==='yes')return 'ok';
    if(v==='ng'||v==='yoq'||v==='no'||v==='rad')return 'fail';
    return null;
  }
  // Numeric check
  const num=parseFloat(val);if(isNaN(num))return null;
  const range=parseSpec(spec);if(!range)return null;
  return(num>=range.min&&num<=range.max)?'ok':'fail';
}

function onV(s,c,m,v){
  ensM(s,c,m);PS[s][c].measures[m].val=v;
  // Auto-determine verdict from value
  const part=G.parts().find(p=>p.code===c);
  const mDef=part?.measures.find(x=>x.id===m);
  const auto=checkSpec(v,mDef?.spec,mDef?.method);
  if(auto){
    PS[s][c].measures[m].verdict=auto;
    // update row color
    const row=document.getElementById('mr_'+c+'_'+m);if(row)row.className=auto?'r'+auto:'';
    const rs=document.getElementById('rs_'+c+'_'+m);if(rs)rs.className='rst '+auto;
    // update verdict buttons
    const btns=row?.querySelectorAll('.vb');if(btns){btns.forEach(b=>b.classList.remove('s'));btns.forEach(b=>{if((auto==='ok'&&b.classList.contains('ok'))||(auto==='fail'&&b.classList.contains('fail')))b.classList.add('s')})}
    updPBadge(s,c);updateSVStats(s,G.parts().filter(p=>p.secId===s));
  }
  // Color the input itself
  const inp=document.querySelector(`#mr_${c}_${m} .ri`);
  if(inp&&auto){inp.style.borderColor=auto==='ok'?'var(--g)':'var(--r)';inp.style.color=auto==='ok'?'var(--g)':'var(--r)'}
  else if(inp){inp.style.borderColor='';inp.style.color=''}
  markU(c);
}
function onNt(s,c,m,v){ensM(s,c,m);PS[s][c].measures[m].note=v}
function onSm(s,c,sm){if(PS[s]?.[c])PS[s][c].smena=sm;document.getElementById('smd_'+c)?.classList.toggle('s',sm==='kunduzgi');document.getElementById('smn_'+c)?.classList.toggle('s',sm==='tungi');markU(c)}
function markU(c){const b=document.getElementById('psb_'+c);if(b?.classList.contains('saved')){b.classList.remove('saved');b.textContent='SAQLASH';if(PS[CS]?.[c])PS[CS][c].saved=false}}
function onVrd(s,c,m,v,btn){
  ensM(s,c,m);const cur=PS[s][c].measures[m].verdict;const nv=cur===v?null:v;
  PS[s][c].measures[m].verdict=nv;
  const row=document.getElementById('mr_'+c+'_'+m);if(row)row.className=nv?'r'+nv:'';
  const rs=document.getElementById('rs_'+c+'_'+m);if(rs)rs.className='rst '+(nv||'');
  row?.querySelectorAll('.vb').forEach(b=>b.classList.remove('s'));if(nv)btn.classList.add('s');
  updPBadge(s,c);updateSVStats(s,G.parts().filter(p=>p.secId===s));markU(c);
}
function updPBadge(s,c){const part=G.parts().find(p=>p.code===c);if(!part)return;const ps=PS[s]?.[c]||{};const tot=part.measures.length;const done=part.measures.filter(m=>ps.measures?.[m.id]?.verdict).length;const fails=part.measures.filter(m=>ps.measures?.[m.id]?.verdict==='fail').length;const b=document.getElementById('pb_'+c);if(!b)return;b.textContent=done>0?`${done}/${tot}`:`—/${tot}`;b.className='pcbdg '+(done===0?'bd-p':fails>0?'bd-f':'bd-o')}
function updateSVStats(secId,parts){let tot=0,ok=0,fl=0,all=0;parts.forEach(p=>{const ps=PS[secId]?.[p.code]||{};p.measures.forEach(m=>{all++;const v=ps.measures?.[m.id]?.verdict;if(v){tot++;if(v==='ok')ok++;if(v==='fail')fl++}})});const t=document.getElementById('stT');const o=document.getElementById('stO');const f=document.getElementById('stF');const pf=document.getElementById('pF');if(t)t.textContent=tot;if(o)o.textContent=ok;if(f)f.textContent=fl;if(pf)pf.style.width=Math.round((tot/Math.max(all,1))*100)+'%'}
function savePartR(s,c){
  const part=G.parts().find(p=>p.code===c);if(!part)return;
  const ps=PS[s]?.[c]||{};
  const tot=part.measures.length;
  const done=part.measures.filter(m=>ps.measures?.[m.id]?.verdict).length;
  const fails=part.measures.filter(m=>ps.measures?.[m.id]?.verdict==='fail').length;
  if(done<tot&&!confirm(`${tot-done} ta o'lchov to'ldirilmagan. Baribir saqlaysizmi?`))return;
  const verdict=fails===0?'YAROQLI':fails<=1?'SHARTLI':'YAROQSIZ';
  const ref=mkRef();
  // Save actual measure values alongside the record
  const measureData=part.measures.map(m=>({
    id:m.id,name:m.name,spec:m.spec,unit:m.unit,method:m.method||'—',
    val:ps.measures?.[m.id]?.val||'',
    verdict:ps.measures?.[m.id]?.verdict||'',
    note:ps.measures?.[m.id]?.note||''
  }));
  const rec={ref,verdict,fails,done,tot,code:c,partName:part.name,model:part.model||'',secId:s,
    operator:CU.name,date:ps.date||curDate(),time:ps.time||curTime(),smena:ps.smena||'kunduzgi',
    ts:Date.now(),measureData};
  const h=G.inspH();h.unshift(rec);LS.set('q6_insph',h.slice(0,500));
  // Sheets ga ham saqlash
  apiPost('saveInspection', {data: {ref:rec.ref, partCode:c, partName:part.name, sectionId:s, operatorName:CU.name, date:rec.date, time:rec.time, shift:rec.smena, verdict, doneCount:done, totalCount:tot, failCount:fails, measureData:JSON.stringify(measureData), createdAt:new Date().toISOString()}}).catch(()=>{});
  // Clear measurement fields for next round, but keep date/smena
  if(PS[s]?.[c]){
    PS[s][c].measures={};
    PS[s][c].saved=false;
  }
  // Re-render the part card so fields are cleared
  const b=document.getElementById('psb_'+c);if(b){b.classList.remove('saved');b.textContent='SAQLASH';}
  // Refresh section view to show updated count + cleared fields
  const secParts=G.parts().filter(p=>p.secId===s);
  const secDef=G.uch().find(u=>u.id===s);
  const canEdit=hasPerm('sections');
  renderSV(secDef,secParts,canEdit);
  updateSVStats(s,secParts);
  // Update freq badge in nav
  buildNav();
  showModal(fails===0?'✅':fails<=1?'⚠️':'❌',verdict,ref,
    `Detal: ${part.name}\n${CU.name}\n${rec.date} · ${rec.time} · ${rec.smena}\nO'lchov: ${done}/${tot} · Rad: ${fails}\n\n✓ Kataklar tozalandi — keyingi o'lchash uchun tayyor`);
}

/* CSV import: code,name,model — har qatorda */
function importCatalogFromCSV(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.csv,.txt';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      const lines=ev.target.result.split('\n').filter(l=>l.trim());
      const cat=G.catalog();let added=0,skip=0;
      lines.forEach(line=>{
        const parts=line.split(',').map(s=>s.replace(/^"|"$/g,'').trim());
        if(parts.length>=2){
          const code=parts[0],name=parts[1],model=parts[2]||'';
          if(code&&name&&!cat.find(c=>c.code===code)){cat.push({code,name,model});added++}
          else skip++;
        }
      });
      LS.set('q6_catalog',cat);
      showModal('📤','IMPORT TUGADI','',`Qo'shildi: ${added} ta\nMavjud edi (o'tkazildi): ${skip} ta`);
      renderRejalashtirish();
    };

function toggleAllPerms(checked){
  const pc=document.getElementById('permCheckboxes');
  if(pc){pc.style.opacity=checked?'.4':'1';pc.style.pointerEvents=checked?'none':'auto'}
}
function saveUserEditor(){
  const name=document.getElementById('uf_name')?.value.trim();
  const id=document.getElementById('uf_id')?.value.trim().replace(/\s/g,'');
  const pass=document.getElementById('uf_pass')?.value.trim();
  const roleRaw=(document.getElementById('uf_role')?.value||'').trim();
  if(!name||!id||!pass||!roleRaw){alert('Ism, login, parol va rol majburiy!');return}
  // Try to match entered text to a ROLE_LABELS value → get the key
  // e.g. user typed "Nazoratchi" → find key "inspector"
  const matchedKey=Object.entries(ROLE_LABELS).find(([k,v])=>v.toLowerCase()===roleRaw.toLowerCase())?.[0];
  const role=matchedKey||roleRaw.toLowerCase().replace(/\s+/g,'_');// use matched key or slug
  // Add the label to ROLE_LABELS if new
  if(!ROLE_LABELS[role]){ROLE_LABELS[role]=roleRaw;}
  const allChecked=document.getElementById('up_all')?.checked;
  let perms=['all'];
  if(!allChecked){
    perms=getAllMenus().filter(m=>document.getElementById('up_'+m.key)?.checked).map(m=>m.key);
    if(!perms.length){alert('Kamida bitta menyu ruxsati tanlang!');return}
  }
  const users=getUsers();
  const color=ROLE_COLORS[role]||'#00b8a0';
  if(editUserIdx!==null){
    const existing=users[editUserIdx];
    users[editUserIdx]={...existing,name,id,pass,role,color,perms};
  } else {
    if(users.find(u=>u.id===id)){alert('Bu login allaqachon mavjud!');return}
    users.push({id,name,pass,role,color,perms});
  }
  saveUsers(users);USERS=users;
  // If editing the currently logged-in user, refresh CU immediately
  if(CU&&(editUserIdx!==null?users[editUserIdx]?.id===CU.id:false)){
    CU={...CU,...users[editUserIdx]};
  }
  document.getElementById('userEditorOvl').classList.remove('on');
  populateLoginSelect();
  buildNav();// re-render nav so changes apply immediately
  renderUsersAdmin();
}
function deleteUser(idx){
  if(!confirm('Foydalanuvchini o\'chirish?'))return;
  const users=getUsers();users.splice(idx,1);saveUsers(users);USERS=users;populateLoginSelect();renderUsersAdmin();
}

function exportInspHistoryExcel(){
  const hist=G.inspH();
  const dateF=(document.getElementById('hfDate')?.value||'').trim();
  const partF=(document.getElementById('hfPart')?.value||'').toLowerCase().trim();
  const filtered=hist.filter(r=>{
    const dm=!dateF||r.date===dateF;
    const mm=!ihMonth||r.date?.startsWith(ihMonth);
    const pm=!partF||r.code?.toLowerCase().includes(partF)||r.partName?.toLowerCase().includes(partF);
    return dm&&mm&&pm;
  });
  // Build rows: one row per measure per record
  const rows=[['REF','Sana','Vaqt','Smena','Operator','Detal kodi','Detal nomi','Verdict','O\'lchov','Rad','O\'lchov №','O\'lchov nomi','Norma','Birlik','Kiritilgan qiymat','Natija','Izoh','Metod']];
  filtered.forEach(r=>{
    if(r.measureData&&r.measureData.length){
      r.measureData.forEach(m=>{
        const verdict=m.verdict==='ok'?'O\'TDI':m.verdict==='fail'?'RAD':'—';
        rows.push([r.ref,r.date,r.time,r.smena,r.operator,r.code,r.partName,r.verdict,r.done+'/'+r.tot,r.fails,m.id?.toUpperCase()||'',m.name,m.spec,m.unit,m.val||'—',verdict,m.note||'—',m.method||'—']);
      });
    } else {
      rows.push([r.ref,r.date,r.time,r.smena,r.operator,r.code,r.partName,r.verdict,r.done+'/'+r.tot,r.fails,'','','','','','','','']);
    }
  });
  downloadCSV(rows,'tekshiruv_tarixi_'+curDate()+'.xls');
}

function exportOneInspExcel(idx){
  const r=G.inspH()[idx];if(!r)return;
  const part=G.parts().find(p=>p.code===r.code);
  const measures=r.measureData||(part?.measures||[]).map(m=>({...m,val:'',verdict:'',note:''}));
  const rows=[
    ['ALFA CONTROL — TEKSHIRUV NATIJASI','','','','','','',''],
    ['','','','','','','',''],
    ['REF:',r.ref,'','Sana:',r.date,'','Vaqt:',r.time],
    ['Operator:',r.operator,'','Smena:',r.smena,'','',''],
    ['Detal kodi:',r.code,'','Detal nomi:',r.partName,'','Model:',r.model||'—'],
    ['Verdict:',r.verdict,'','O\'lchov:',r.done+'/'+r.tot,'','Rad etilgan:',r.fails],
    ['','','','','','','',''],
    ['O\'LCHOV NATIJALARI','','','','','','',''],
    ['№','Nomi','Norma (spec)','Birlik','Kiritilgan qiymat','Natija','Izoh','Metod'],
  ];
  measures.forEach(m=>{
    const verdict=m.verdict==='ok'?'✓ O\'TDI':m.verdict==='fail'?'✗ RAD':'—';
    rows.push([m.id?.toUpperCase()||'',m.name,m.spec,m.unit,m.val||'—',verdict,m.note||'—',m.method||'—']);
  });
  rows.push(['','','','','','','','']);
  rows.push(['Saqlab qolindi:',new Date(r.ts).toLocaleString('uz-UZ'),'','','','','','']);
  downloadCSV(rows,r.ref+'_tekshiruv.xls');
}

function downloadCSV(rows, filename){
  // Generate HTML table that Excel opens natively as .xls
  const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const head=rows[0]||[];const body=rows.slice(1);
  const html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel">
<head><meta charset="UTF-8"><style>
th{background:#1c2236;color:#f0b429;font-weight:bold;padding:6px 10px;border:1px solid #ccc}
td{padding:5px 10px;border:1px solid #ddd}
tr:nth-child(even) td{background:#f5f5f5}
</style></head><body><table>
<thead><tr>${head.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead>
<tbody>${body.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('')}</tbody>
</table></body></html>`;
  const bom='\uFEFF';
  const blob=new Blob([bom+html],{type:'application/vnd.ms-excel;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

function submitFTQ(){
  const ref=mkRef();const rec={ref,id:ref,operator:CU.name,operatorRole:CU.role,ts:Date.now(),entries:JSON.parse(JSON.stringify(ftqEntries))};
  const h=G.ftqH();h.unshift(rec);LS.set('q6_ftqh',h.slice(0,200));
  importScrapFromFTQ(rec);
  apiPost('saveFTQ',{data:{ref,operatorName:CU.name,operatorRole:CU.role,submittedAt:new Date().toISOString(),entries:JSON.stringify(rec.entries)}}).catch(()=>{});
  const totScrap=ftqEntries.reduce((s,e)=>s+(parseInt(e.scrap)||0),0);

}

  const rows=[['REF','Yuborilgan sana','Operator','Detal kodi','Detal nomi','Sana','Smena','OK','NG','Total','FTQ %','PPM','Rework','Scrap','NG turlari']];

/* Scrap records come from:
   1. FTQ entries that have scrap > 0 (auto-imported on FTQ submit)
   2. Manual entries added from Scrap menu
*/
function importScrapFromFTQ(ftqRec){
  // called when FTQ is submitted - auto-create pending scrap records
  const existing=G.scrapH();
  const newScraps=[];
  (ftqRec.entries||[]).forEach(e=>{
    const sc=parseInt(e.scrap)||0;if(!sc)return;
    const part=G.parts().find(p=>p.code===e.partCode);
    const alreadyExists=existing.some(s=>s.ftqRef===ftqRec.ref&&s.partCode===e.partCode);
    if(!alreadyExists){
      newScraps.push({
        ref:mkRef(),ftqRef:ftqRec.ref,partCode:e.partCode,
        partName:part?.name||e.partCode||'—',qty:sc,
        date:e.date||curDate(),operator:ftqRec.operator,
        status:'pending',approvals:{qmaster:null,pmaster:null},
        ngTypes:(e.ngItems||[]).filter(i=>i.type&&i.cnt).map(i=>i.type+'('+i.cnt+')').join(', '),
        source:'ftq',ts:Date.now()
      });
    }
  });
  if(newScraps.length){
    const all=[...newScraps,...existing];LS.set('q6_scrap',all.slice(0,300));
  }
}

function submitScrap(){
  const partCode=document.getElementById('scPart')?.value;const qty=parseInt(document.getElementById('scQty')?.value)||0;const date=document.getElementById('scDate')?.value||curDate();const reason=document.getElementById('scReason')?.value||'';
  if(!partCode||!qty){alert('Detal va miqdor majburiy!');return}
  const part=getCatalogOrPart(partCode);
  const rec={ref:mkRef(),partCode,partName:part?.name||'',qty,date,reason,operator:CU.name,status:'pending',approvals:{qmaster:null,pmaster:null},source:'manual',ts:Date.now()};
  const sc=G.scrapH();sc.unshift(rec);LS.set('q6_scrap',sc);
  closeCodeModal();buildNav();renderScrap();showModal('🗑️','SCRAP QO\'SHILDI',rec.ref,`Detal: ${part?.name||partCode}\nMiqdor: ${qty} dona\nHolat: ⏳ Tasdiqlash kutilmoqda`);
}
function approveScrap(si,role){
  const sc=G.scrapH();if(!sc[si])return;if(!sc[si].approvals)sc[si].approvals={};sc[si].approvals[role]=CU.name;
  if(sc[si].approvals.qmaster&&sc[si].approvals.pmaster)sc[si].status='approved';
  LS.set('q6_scrap',sc);buildNav();renderScrap();
}
function rejectScrap(si){if(!confirm('Rad etish?'))return;const sc=G.scrapH();if(sc[si])sc[si].status='rejected';LS.set('q6_scrap',sc);renderScrap()}

function mkRef(){const d=new Date();return `QC-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}-${String(refN++).padStart(4,'0')}`}
function curDate(){return new Date().toISOString().split('T')[0]}
function curTime(){const n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')}

function openOEEDashboard(){setTop('OEE','OEE Dashboard');showV('OEEV');renderOEEDashboard()}
function renderOEEDashboard(){
  const v=document.getElementById('OEEV');
  v.innerHTML=`
    <div class="vhdr"><div><div class="vtitle">📊 OEE DASHBOARD</div><div class="vsub">// Overall Equipment Effectiveness</div></div></div>
    <div style="background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:16px;margin-bottom:16px;font-family:var(--mn);font-size:11px;color:var(--mt2)">
      ℹ️ OEE = <b style="color:var(--g)">Mavjudlik (A)</b> × <b style="color:var(--a)">Unumdorlik (P)</b> × <b style="color:var(--b)">Sifat (Q)</b>
      <br><span style="font-size:10px;margin-top:4px;display:block">Hisoblash uchun: Jarayonlar siklida tsikl vaqtini kiriting, smena rejasini va fakt kiritishni to'ldiring.</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">
      ${G.machines().map(m=>{
        const andons=G.andons().filter(a=>a.machineId===m.id&&a.status==='closed');
        const stopMin=andons.reduce((s,a)=>{
          if(a.openedAt&&a.closedAt)return s+Math.round((new Date(a.closedAt)-new Date(a.openedAt))/60000);
          return s;
        },0);
        const shiftMin=480;
        const availMin=Math.max(0,shiftMin-stopMin);
        const A=shiftMin>0?(availMin/shiftMin*100).toFixed(1):0;
        // Q — from FTQ for today
        const todayFTQ=G.ftqH().flatMap(r=>r.entries||[]).filter(e=>e.date===curDate());
        const ok=todayFTQ.reduce((s,e)=>s+(parseInt(e.ok)||0),0);
        const ng=todayFTQ.reduce((s,e)=>s+e.ngItems.reduce((ns,i)=>ns+(parseInt(i.cnt)||0),0),0);
        const tot=ok+ng;
        const Q=tot>0?((ok/tot)*100).toFixed(1):100;
        const col=parseFloat(A)>=85?'var(--g)':parseFloat(A)>=60?'var(--a)':'var(--r)';
        return `<div style="background:var(--panel);border:1px solid var(--bd);border-radius:8px;padding:14px">
          <div style="font-family:var(--mn);font-size:11px;font-weight:700;color:var(--a);margin-bottom:10px">⚙️ ${m.id} — ${m.name}</div>
          <div style="font-family:var(--mn);font-size:9px;color:var(--mt);margin-bottom:4px">${G.uch().find(u=>u.id===m.secId)?.name||m.secId}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px;text-align:center">
            <div style="background:var(--s1);border-radius:5px;padding:8px">
              <div style="font-family:var(--dp);font-size:20px;color:${col}">${A}%</div>
              <div style="font-family:var(--mn);font-size:8px;color:var(--mt)">MAVJUDLIK</div>
            </div>
            <div style="background:var(--s1);border-radius:5px;padding:8px">
              <div style="font-family:var(--dp);font-size:20px;color:var(--a)">—%</div>
              <div style="font-family:var(--mn);font-size:8px;color:var(--mt)">UNUMDORLIK</div>
            </div>
            <div style="background:var(--s1);border-radius:5px;padding:8px">
              <div style="font-family:var(--dp);font-size:20px;color:var(--b)">${Q}%</div>
              <div style="font-family:var(--mn);font-size:8px;color:var(--mt)">SIFAT</div>
            </div>
          </div>
          <div style="font-family:var(--mn);font-size:9px;color:var(--mt)">To'xtalish: ${stopMin} daq · Andon: ${andons.length} ta</div>
        </div>`;
      }).join('') || '<div class="empty">Dastgohlar kiritilmagan. Maintenance → Dastgohlar bazasiga kiriting.</div>'}
    </div>`;
}

  procEditCode=code;procEditIdx=idx;

  const list=procs[code]||[];

      </div>
      <div>
        <label class="lbl">Dastgoh <span style="color:var(--r)">*</span></label>
        <select class="inp" id="proc_machine">
          <option value="">— Tanlang —</option>
          ${machines.map(m=>`<option value="${m.id}" ${p?.machineId===m.id?'selected':''}>${m.id} — ${m.name} (${G.uch().find(u=>u.id===m.secId)?.name||m.secId})</option>`).join('')}
        </select>
        ${!machines.length?`<div style="font-family:var(--mn);font-size:9px;color:var(--r);margin-top:3px">⚠️ Dastgohlar kiritilmagan. Maintenance → Dastgohlar bazasiga kiring.</div>`:''}
      </div>
      <div>
        <label class="lbl">Sikl vaqti <span style="color:var(--r)">*</span> <span style="font-weight:400;color:var(--mt)">(sekundda — 1 dona uchun standart)</span></label>
        <input class="inp" type="number" min="0.1" step="0.1" id="proc_cycle" value="${p?.cycleTime||''}" placeholder="masalan: 45.5">
      </div>
      <div>
        <label class="lbl">Izoh</label>
        <input class="inp" id="proc_note" value="${p?.note||''}" placeholder="ixtiyoriy">
      </div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-o" onclick="document.getElementById('procEditorOvl').classList.remove('on')">Bekor</button>
      <button class="btn btn-a" onclick="saveProcess()">SAQLASH</button>
    </div>
  </div>`;
  ov.classList.add('on');setTimeout(()=>ov.querySelector('div').style.transform='scale(1)',10);
}

function saveProcess(){
  const name=document.getElementById('proc_name')?.value.trim();
  const machineId=document.getElementById('proc_machine')?.value;
  const cycleTime=parseFloat(document.getElementById('proc_cycle')?.value);
  const note=document.getElementById('proc_note')?.value.trim();
  if(!name){alert('Jarayon nomi majburiy!');return}
  if(!machineId){alert('Dastgoh majburiy!');return}
  if(!cycleTime||cycleTime<=0){alert('Sikl vaqti majburiy!');return}
  const procs=G.processes();
  if(!procs[procEditCode])procs[procEditCode]=[];
  const rec={name,machineId,cycleTime,note:note||''};
  if(procEditIdx!==null&&procEditIdx!==undefined)procs[procEditCode][procEditIdx]=rec;
  else procs[procEditCode].push(rec);
  LS.set('q6_processes',procs);
  apiPost('saveProcesses',{code:procEditCode,data:procs[procEditCode]||[]}).catch(()=>{});
  document.getElementById('procEditorOvl').classList.remove('on');
  // Refresh content
  const content=document.getElementById('oep_content_'+procEditCode);
  if(content)content.innerHTML=buildProcessTable(procEditCode,procs[procEditCode]||[]);
  // Update cycle total in card header
  renderOEEProcess();
}

function deleteProcess(code,idx){
  if(!confirm('Jarayonni o\'chirish?'))return;
  const procs=G.processes();
  if(procs[code])procs[code].splice(idx,1);
  LS.set('q6_processes',procs);
  const content=document.getElementById('oep_content_'+code);
  if(content)content.innerHTML=buildProcessTable(code,procs[code]||[]);
  renderOEEProcess();
}

  renderMachines();
