/* ═══════════════════════════════════════════════════════
   XODIMLAR BAZASI
═══════════════════════════════════════════════════════ */
function openWorkers(){setTop('Xodimlar','Xodimlar bazasi');showV('WrkV');renderWorkers()}
function renderWorkers(){
  const workers=G.workers();
  const wv=document.getElementById('WrkV');
  wv.innerHTML=`
    <div class="vhdr">
      <div><div class="vtitle">👷 XODIMLAR BAZASI</div><div class="vsub">// Jami ${workers.length} ta xodim</div></div>
      <button class="btn btn-a" onclick="openWorkerEditor(null)">＋ Qo'shish</button>
    </div>
    <div class="tbl" id="wrkTbl"></div>`;
  const t=document.getElementById('wrkTbl');
  if(!workers.length){t.innerHTML='<div class="empty">Hali xodim qo\'shilmagan</div>';return}
  const uch=G.uch();
  t.innerHTML=`<div class="tr th">
    <span style="flex:1">ISM FAMILIYA</span>
    <span class="tc" style="width:150px">BO'LIM</span>
    <span class="tc" style="width:140px">LAVOZIM</span>
    <span class="tc" style="width:140px">UCHASTKA</span>
    <span class="tc" style="width:80px">&nbsp;</span>
  </div>`+workers.map((w,i)=>`
    <div class="tr">
      <span style="flex:1;font-weight:600">${w.name}</span>
      <span class="tc" style="width:150px;font-size:11px;color:var(--mt2)">${w.dept||'—'}</span>
      <span class="tc" style="width:140px;font-size:11px;color:var(--mt2)">${w.position||'—'}</span>
      <span class="tc" style="width:140px;font-size:11px;color:var(--mt2)">${uch.find(u=>u.id===w.secId)?.name||'—'}</span>
      <div class="tc" style="width:80px;display:flex;gap:4px">
        <button class="btn btn-o btn-sm" onclick="openWorkerEditor(${i})">✏️</button>
        <button class="btn btn-r btn-sm" onclick="deleteWorker(${i})">🗑</button>
      </div>
    </div>`).join('');
}

let wrkEditIdx=null;
function openWorkerEditor(idx){
  wrkEditIdx=idx;
  const workers=G.workers();const w=idx!==null?workers[idx]:null;
  const uch=G.uch();
  // Mavjud bo'limlar = DEF_DEPTS + qo'shilganlar
  const customDepts=[...new Set(workers.map(x=>x.dept).filter(Boolean))];
  const allDepts=[...new Set([...DEF_DEPTS,...customDepts])];
  // Mavjud lavozimlar = DEF_POSITIONS + qo'shilganlar
  const customPos=[...new Set(workers.map(x=>x.position).filter(Boolean))];
  const allPos=[...new Set([...DEF_POSITIONS,...customPos])];

  let ov=document.getElementById('wrkEditorOvl');
  if(!ov){ov=document.createElement('div');ov.id='wrkEditorOvl';ov.className='ovl';document.body.appendChild(ov);}
  ov.innerHTML=`<div style="background:var(--panel);border:1px solid var(--bd2);border-radius:10px;padding:24px;width:100%;max-width:460px;transform:scale(.88);transition:transform .3s">
    <div style="font-family:var(--dp);font-size:20px;letter-spacing:2px;margin-bottom:16px;color:var(--a)">${w?'TAHRIRLASH':'YANGI XODIM'}</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div>
        <label class="lbl">Ism Familiya <span style="color:var(--r)">*</span></label>
        <input class="inp" id="wrk_name" value="${w?.name||''}" placeholder="Karimov Jamshid">
      </div>
      <div>
        <label class="lbl">Bo'lim <span style="color:var(--r)">*</span> <span style="font-weight:400;color:var(--mt)">(tanlang yoki yangi kiriting)</span></label>
        <select class="inp" id="wrk_dept_sel" onchange="onDeptSelChange(this.value)">
          <option value="">— Tanlang —</option>
          ${allDepts.map(d=>`<option value="${d}" ${w?.dept===d?'selected':''}>${d}</option>`).join('')}
          <option value="__new__">＋ Yangi bo'lim...</option>
        </select>
        <input class="inp" id="wrk_dept_inp" value="${w?.dept&&!allDepts.includes(w.dept)?w.dept:''}"
          placeholder="Yangi bo'lim nomini kiriting"
          style="margin-top:5px;display:${w?.dept&&!allDepts.includes(w.dept)?'block':'none'}">
      </div>
      <div>
        <label class="lbl">Lavozim <span style="color:var(--r)">*</span> <span style="font-weight:400;color:var(--mt)">(tanlang yoki yangi kiriting)</span></label>
        <select class="inp" id="wrk_pos_sel" onchange="onPosSelChange(this.value)">
          <option value="">— Tanlang —</option>
          ${allPos.map(p=>`<option value="${p}" ${w?.position===p?'selected':''}>${p}</option>`).join('')}
          <option value="__new__">＋ Yangi lavozim...</option>
        </select>
        <input class="inp" id="wrk_pos_inp" value="${w?.position&&!allPos.includes(w.position)?w.position:''}"
          placeholder="Yangi lavozim nomini kiriting"
          style="margin-top:5px;display:${w?.position&&!allPos.includes(w.position)?'block':'none'}">
      </div>
      <div>
        <label class="lbl">Uchastka</label>
        <select class="inp" id="wrk_sec">
          <option value="">— Tanlang —</option>
          ${uch.map(u=>`<option value="${u.id}" ${w?.secId===u.id?'selected':''}>${u.icon} ${u.name}</option>`).join('')}
        </select>
      </div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-o" onclick="document.getElementById('wrkEditorOvl').classList.remove('on')">Bekor</button>
      <button class="btn btn-a" onclick="saveWorker()">SAQLASH</button>
    </div>
  </div>`;
  ov.classList.add('on');setTimeout(()=>ov.querySelector('div').style.transform='scale(1)',10);
}

function onDeptSelChange(val){
  const inp=document.getElementById('wrk_dept_inp');if(!inp)return;
  if(val==='__new__'){inp.style.display='block';inp.value='';inp.focus();}
  else{inp.style.display='none';inp.value=val;}
}
function onPosSelChange(val){
  const inp=document.getElementById('wrk_pos_inp');if(!inp)return;
  if(val==='__new__'){inp.style.display='block';inp.value='';inp.focus();}
  else{inp.style.display='none';inp.value=val;}
}

function saveWorker(){
  const name=document.getElementById('wrk_name')?.value.trim();
  const dSel=document.getElementById('wrk_dept_sel')?.value;
  const dInp=document.getElementById('wrk_dept_inp')?.value.trim();
  const dept=dSel==='__new__'||!dSel?dInp:dSel;
  const pSel=document.getElementById('wrk_pos_sel')?.value;
  const pInp=document.getElementById('wrk_pos_inp')?.value.trim();
  const position=pSel==='__new__'||!pSel?pInp:pSel;
  const secId=document.getElementById('wrk_sec')?.value;
  if(!name){alert('Ism Familiya majburiy!');return}
  if(!dept){alert('Bo\'lim majburiy!');return}
  if(!position){alert('Lavozim majburiy!');return}
  const workers=G.workers();
  const rec={name,dept,position,secId:secId||''};
  if(wrkEditIdx!==null)workers[wrkEditIdx]=rec;
  else workers.push(rec);
  LS.set('q6_workers',workers);
  apiPost('saveWorker',{data:{name,dept,position,secId:secId||''}}).catch(()=>{});
  document.getElementById('wrkEditorOvl').classList.remove('on');
  renderWorkers();
}

function deleteWorker(i){
  if(!confirm('Xodimni o\'chirish?'))return;
  const workers=G.workers();workers.splice(i,1);
  LS.set('q6_workers',workers);renderWorkers();
}

/* ═══════════════════════════════════════════════════════
   ANDON YUBORISH
═══════════════════════════════════════════════════════ */
function openAndon(){setTop('Andon','Andon yuborish');showV('AndV');renderAndon()}
function renderAndon(){
  const andons=G.andons();
  const open=andons.filter(a=>a.status==='open');
  const closed=andons.filter(a=>a.status==='closed').slice(0,20);
  document.getElementById('AndV').innerHTML=`
    <div class="vhdr">
      <div><div class="vtitle">🚨 ANDON</div><div class="vsub">// Ochiq: ${open.length} · Yopilgan: ${andons.filter(a=>a.status==='closed').length}</div></div>
      <button class="btn btn-r" style="font-size:15px;letter-spacing:1px" onclick="openAndonEditor()">🚨 ANDON YUBORISH</button>
    </div>
    <!-- Ochiq andonlar -->
    ${open.length?`
    <div style="font-family:var(--mn);font-size:10px;color:var(--r);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;animation:pulse2 1.2s infinite">● OCHIQ ANDONLAR (${open.length})</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:18px">
      ${open.map((a,i)=>buildAndonCard(a,andons.indexOf(a),true)).join('')}
    </div>`:''}
    <!-- Yopilgan andonlar tarixi -->
    <div style="font-family:var(--mn);font-size:10px;color:var(--mt);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">YAQINDA YOPILGANLAR</div>
    ${closed.length?`<div style="display:flex;flex-direction:column;gap:6px">${closed.map((a,i)=>buildAndonCard(a,andons.indexOf(a),false)).join('')}</div>`:'<div class="empty">Hali yopilgan andon yo\'q</div>'}`;
}

function buildAndonCard(a,idx,isOpen){
  const stColor=STOP_TYPES.find(s=>s.key===a.stopType)?.color||'#888';
  const duration=a.closedAt?Math.round((new Date(a.closedAt)-new Date(a.openedAt))/60000)+'daq':'Ochiq';
  return `<div style="background:var(--panel);border:2px solid ${isOpen?stColor:'var(--bd)'};border-radius:8px;overflow:hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:${isOpen?stColor+'15':'var(--s2)'};flex-wrap:wrap;gap:6px">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-family:var(--dp);font-size:20px;color:${stColor}">${a.stopType}</span>
        <div>
          <div style="font-family:var(--mn);font-size:11px;font-weight:700">${a.partCode} — ${a.partName}</div>
          <div style="font-family:var(--mn);font-size:9px;color:var(--mt)">${a.section} · ${a.openedAt} · ${a.brigadir||'—'}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="chip" style="background:${isOpen?stColor+'22':'var(--gd)'};color:${isOpen?stColor:'var(--g)'};border:1px solid ${isOpen?stColor+'44':'rgba(14,207,130,.3)'}">${isOpen?'🔴 Ochiq':'✅ Yopildi · '+duration}</span>

      </div>
    </div>
    <div style="padding:10px 14px;font-family:var(--mn);font-size:11px;color:var(--mt2)">${a.reason||'—'}${a.machineId?`<span style="margin-left:8px;color:var(--mt)">⚙️ ${a.machineId} — ${a.machineName||''}</span>`:''}</div>
  </div>`;
}

/* Uchastka o'zgarganda brigadir spiskasini yangilash */
function onAndonUchChange(secId, fromPartSelect){
  // Brigadir spiskasi — uchastka bo'yicha, faqat Ishlab chiqarish bo'limidan
  const bSel=document.getElementById('and_brig');
  if(bSel){
    const workers=G.workers();
    const filtered=workers.filter(w=>
      w.dept&&w.dept.toLowerCase().includes('ishlab')&&
      (!secId||w.secId===secId||!w.secId)
    );
    bSel.innerHTML=`<option value="">— Tanlang —</option>`+
      filtered.map(w=>`<option value="${w.name}">${w.name} — ${w.position}</option>`).join('')+
      (!filtered.length?`<option value="${CU.name}">${CU.name}</option>`:'');
  }
  // Dastgohlar — uchastka bo'yicha
  const mSel=document.getElementById('and_machine');
  if(mSel){
    const machines=secId?G.machines().filter(m=>m.secId===secId):G.machines();
    mSel.innerHTML=`<option value="">— Dastgoh tanlang —</option>`+
      machines.map(m=>`<option value="${m.id}" data-name="${m.name}">${m.id} — ${m.name}</option>`).join('');
  }
  // Detal maydonlarini FAQAT foydalanuvchi o'zi uchastka o'zgartirganda tozalash
  // (detal tanlanganida chaqirilsa — tozalanmasin)
  if(!fromPartSelect){
    ['and_code','and_pname','and_model','and_lin'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  }
}

function andonPartSearch(val){
  const dd=document.getElementById('andonPartDd');
  if(!val||val.trim().length<2){dd.style.display='none';return}
  const q=val.trim().toLowerCase();
  // Katalogdan qidirish — secId filtrisiz (detal tanlanganida uchastka avtomatik to'ldiriladi)
  const cat=G.catalog();
  const catResults=cat.filter(c=>c.code.toLowerCase().includes(q)||c.name.toLowerCase().includes(q)).slice(0,10);
  // Katalogda yo'q bo'lsa parts dan ham qidirish
  const allParts=G.parts();
  const partResults=allParts.filter(p=>(p.code.toLowerCase().includes(q)||p.name.toLowerCase().includes(q))&&!catResults.find(c=>c.code===p.code)).slice(0,4);
  const combined=[...catResults,...partResults];
  if(!combined.length){dd.style.display='none';return}
  dd.style.display='block';
  const uch=G.uch();
  dd.innerHTML=combined.map(c=>`
    <div onmousedown="andonSelectPart('${c.code.replace(/'/g,"\\'")}','${c.name.replace(/'/g,"\\'")}','${(c.model||'').replace(/'/g,"\\'")}','${c.secId||''}','${c.linId||''}')"
      style="padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--bd)"
      onmouseover="this.style.background='var(--rd)'" onmouseout="this.style.background=''">
      <div style="font-family:var(--mn);font-size:11px;color:var(--a);font-weight:700">${c.code}</div>
      <div style="font-size:12px;font-weight:600">${c.name}</div>
      <div style="font-family:var(--mn);font-size:10px;color:var(--mt2)">${uch.find(u=>u.id===c.secId)?.name||'—'} · ${c.linId||'—'} · ${c.model||'—'}${c.subParts?.length?' · 📦'+c.subParts.length+' sub':''}</div>
    </div>`).join('');
}

let curAndonStop='';
function selectAndonStop(key,color){
  curAndonStop=curAndonStop===key?'':key;
  STOP_TYPES.forEach(st=>{
    const el=document.getElementById('and_st_'+st.key);
    if(el){el.style.background=curAndonStop===st.key?st.color+'22':'';el.style.borderColor=curAndonStop===st.key?st.color:'var(--bd2)';el.style.color=curAndonStop===st.key?st.color:'var(--mt2)';}
  });
  if(document.getElementById('and_stop_val'))document.getElementById('and_stop_val').value=curAndonStop;
  // M: dastgoh wrap
  const mw=document.getElementById('and_machine_wrap');
  if(mw)mw.style.display=curAndonStop==='M'?'block':'none';
  // S: sub detallar wrap — sub parts already loaded on part select
  const sw=document.getElementById('and_sub_wrap');
  if(sw)sw.style.display=curAndonStop==='S'?'block':'none';
}

function andonSelectPart(code,name,model,secId,linId){
  const uch=G.uch();
  document.getElementById('and_code').value=code;
  document.getElementById('and_pname').value=name;
  document.getElementById('and_model').value=model||'—';
  document.getElementById('and_lin').value=linId||'—';
  // Uchastka — readonly display + hidden value
  const secName=uch.find(u=>u.id===secId)?.name||secId||'—';
  const uchNameEl=document.getElementById('and_uch_name');
  const uchValEl=document.getElementById('and_uch');
  if(uchNameEl)uchNameEl.value=secName;
  if(uchValEl)uchValEl.value=secId||'';
  // Brigadir va dastgohlarni yangilash (fromPartSelect=true)
  onAndonUchChange(secId, true);
  document.getElementById('andonPartDd').style.display='none';
  // Sub detallarni yuklash (S tanlangan bo'lsa)
  loadAndonSubParts(code);
}

function loadAndonSubParts(code){
  const subSel=document.getElementById('and_sub_sel');
  if(!subSel)return;
  const catItem=G.catalog().find(c=>c.code===code);
  const subs=catItem?.subParts||[];
  if(subs.length){
    subSel.innerHTML=subs.map(s=>`<option value="${s.code}">${s.code} — ${s.name}</option>`).join('');
  } else {
    subSel.innerHTML='<option value="" disabled>Bu detal uchun sub detallar kiritilmagan</option>';
  }
}

function submitAndon(){
  const uchSel=document.getElementById('and_uch');
  const secId=uchSel?.value;
  const section=G.uch().find(u=>u.id===secId)?.name||secId||'—';
  const code=document.getElementById('and_code')?.value.trim();
  const partName=document.getElementById('and_pname')?.value.trim();
  const model=document.getElementById('and_model')?.value.trim();
  const date=document.getElementById('and_date')?.value;
  const time=document.getElementById('and_time')?.value;
  const brigadir=document.getElementById('and_brig')?.value;
  const stopType=document.getElementById('and_stop_val')?.value;
  const reason=document.getElementById('and_reason')?.value.trim();
  const machSel=document.getElementById('and_machine');
  const machineId=machSel?.value||'';
  const machineName=machSel?.selectedOptions[0]?.dataset?.name||'';
  // S uchun tanlangan sub detallar
  const subSel=document.getElementById('and_sub_sel');
  const selectedSubs=subSel?[...subSel.selectedOptions].map(o=>o.value).filter(Boolean):[];
  const linId=document.getElementById('and_lin')?.value||'';

  if(!code)      {alert('Detal raqami majburiy!');return}
  if(!brigadir)  {alert('Brigadir majburiy!');return}
  if(!stopType)  {alert('To\'xtalish turi majburiy!');return}
  if(!reason)    {alert('Muammo tavsifi majburiy!');return}
  if(stopType==='M'&&!machineId){alert('M tanlanganda dastgoh ham majburiy!');return}

  const rec={
    id:'and_'+Date.now(),
    partCode:code||'—', partName:partName||'—', section, model:model||'—', linId,
    openedAt:date+' '+time,
    brigadir, stopType, reason,
    machineId, machineName,
    subParts:selectedSubs,
    status:'open',
    openedBy:CU.name,
    closedAt:null, closedBy:null,
    ts:Date.now()
  };
  const andons=G.andons();andons.unshift(rec);
  LS.set('q6_andons',andons);
  apiPost('saveAndon',{data:{id:rec.id,partCode:rec.partCode,partName:rec.partName,section:rec.section,model:rec.model,openedAt:rec.openedAt,brigadir:rec.brigadir,stopType:rec.stopType,reason:rec.reason,machineId:rec.machineId,machineName:rec.machineName,subParts:JSON.stringify(rec.subParts||[]),status:'open',openedBy:rec.openedBy,closedAt:'',closedBy:'',workDone:''}}).catch(()=>{});
  curAndonStop='';
  document.getElementById('andonEditorOvl').classList.remove('on');
  buildNav();renderAndon();
  showModal('🚨','ANDON YUBORILDI',rec.openedAt,`Uchastka: ${section}\nDetal: ${rec.partCode} — ${rec.partName}\nBrigadir: ${brigadir}\nTur: ${stopType}\n${reason}`);
}

function confirmCloseAndon(idx){
  const wSel=document.getElementById('ac_worker')?.value;
  const wInp=document.getElementById('ac_worker_inp')?.value.trim();
  const worker=wSel==='__other__'?wInp:wSel;
  const date=document.getElementById('ac_date')?.value;
  const time=document.getElementById('ac_time')?.value;
  const work=document.getElementById('ac_work')?.value.trim();
  const machSel=document.getElementById('ac_machine');
  if(!worker){alert('Bajargan xodim majburiy!');return}
  if(!work){alert('Bajarilgan ish tavsifi majburiy!');return}
  const andons=G.andons();
  if(!andons[idx])return;
  andons[idx].status='closed';
  andons[idx].closedAt=date+' '+time;
  andons[idx].closedBy=worker;
  andons[idx].workDone=work;
  if(machSel?.value&&machSel.value!==andons[idx].machineId){
    andons[idx].machineId=machSel.value;
    andons[idx].machineName=machSel.selectedOptions[0]?.dataset?.name||machSel.value;
  }
  LS.set('q6_andons',andons);
  apiPost('updateAndon',{id:andons[idx]?.id,data:{status:'closed',closedAt:andons[idx]?.closedAt,closedBy:andons[idx]?.closedBy,workDone:andons[idx]?.workDone,machineId:andons[idx]?.machineId,machineName:andons[idx]?.machineName}}).catch(()=>{});
  document.getElementById('andonCloseOvl').classList.remove('on');
  buildNav();renderAndonClose(false, andons[idx]?.stopType||'M');
  showModal('✅','ANDON YOPILDI',date+' '+time,`Bajargan: ${worker}\n${work}`);
}

  openCloseAndonModal(idx);
}

function exportAndonExcel(){
  const andons=G.andons();

  andons.forEach(a=>{
    const dur=a.closedAt&&a.openedAt?Math.round((new Date(a.closedAt)-new Date(a.openedAt))/60000):'';
    rows.push([a.openedAt,a.section,a.partCode,a.partName,a.model||'—',a.brigadir||'—',a.stopType,a.machineId||'—',a.reason||'—',a.status==='open'?'Ochiq':'Yopildi',a.closedAt||'—',a.closedBy||'—',a.workDone||'—',dur]);

}

    </div>
    <div id="planTabContent"></div>`;

function buildPlanKPI(plans){
  const totalPlan=plans.reduce((s,p)=>s+(parseInt(p.plan)||0),0);
  const totalFact=plans.reduce((s,p)=>s+(parseInt(p.fact)||0),0);
  const pct=totalPlan>0?Math.round((totalFact/totalPlan)*100):0;
  const color=pct>=100?'var(--g)':pct>=80?'var(--a)':'var(--r)';
  const stopQ=plans.filter(p=>p.stopType==='Q').length;
  const stopP=plans.filter(p=>p.stopType==='P').length;
  const stopM=plans.filter(p=>p.stopType==='M').length;
  return `
    <div class="kpi"><div class="kpi-v" style="color:var(--a)">${totalPlan.toLocaleString()}</div><div class="kpi-l">Reja</div><div class="kpi-s">Jami reja</div></div>
    <div class="kpi"><div class="kpi-v" style="color:var(--g)">${totalFact.toLocaleString()}</div><div class="kpi-l">Fakt</div><div class="kpi-s">Jami bajarildi</div></div>
    <div class="kpi"><div class="kpi-v" style="color:${color}">${pct}%</div><div class="kpi-l">Bajarilish</div><div class="kpi-s">Reja / Fakt %</div></div>
    <div class="kpi"><div class="kpi-v" style="color:var(--r)">${stopQ+stopP+stopM}</div><div class="kpi-l">To'xtalishlar</div><div class="kpi-s">Q:${stopQ} P:${stopP} M:${stopM}</div></div>`;
}

let curPlanTab='k';
function setPlanTab(tab){
  curPlanTab=tab;
  ['k','t','h'].forEach(t=>{
    const el=document.getElementById('ptab_'+t);
    if(el)el.className=el.className.replace(' a','').replace('ref-tab','ref-tab')+(t===tab?' a':'');

  renderPlanTabContent(tab);

      ${dates.map(d=>{
        const dp=plans.filter(p=>p.date===d);
        const tp=dp.reduce((s,p)=>s+(parseInt(p.plan)||0),0);
        const tf=dp.reduce((s,p)=>s+(parseInt(p.fact)||0),0);

        const c=pct>=100?'var(--g)':pct>=80?'var(--a)':'var(--r)';
        return `<div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--s2);border-bottom:1px solid var(--bd);cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
            <span style="font-family:var(--mn);font-size:12px;font-weight:700">${d}</span>
            <div style="display:flex;align-items:center;gap:10px">
              <span style="font-family:var(--mn);font-size:11px;color:var(--mt)">Reja: ${tp} · Fakt: ${tf}</span>
              <span class="chip" style="background:${pct>=100?'var(--gd)':pct>=80?'var(--ad)':'var(--rd)'};color:${c};border:1px solid ${c}">${pct}%</span>
              <span style="color:var(--mt);font-size:12px">▾</span>
            </div>
          </div>
          <div style="display:none">${buildPlanTable(dp,false)}</div>
        </div>`;
      }).join('')}
    </div>`;
    return;
  }

  const shift=tab==='k'?'kunduzgi':'tungi';
  const todayShiftPlans=plans.filter(p=>p.date===today&&p.shift===shift);
  const shiftLabel=tab==='k'?'☀️ Kunduzgi smena':'🌙 Tungi smena';

  cont.innerHTML=`
    <div style="font-family:var(--mn);font-size:10px;color:var(--mt);margin-bottom:10px;letter-spacing:1px">${shiftLabel} · ${today}</div>
    ${todayShiftPlans.length?buildPlanTable(todayShiftPlans,true):`<div class="empty">Bu smena uchun reja yo'q. ${canCreatePlan()?`<a href="#" onclick="openPlanEditor(null)" style="color:var(--a)">＋ Reja qo'shish</a>`:''}</div>`}`;
}

function buildPlanTable(plans,showActions){
  if(!plans.length) return `<div class="empty">Yozuvlar yo'q</div>`;
  const rows=plans.map(p=>{
    const pv=parseInt(p.plan)||0;const fv=parseInt(p.fact)||0;
    const hasFact=p.fact!==undefined&&p.fact!=='';
    const pct=pv>0&&hasFact?Math.round((fv/pv)*100):null;
    const c=pct===null?'var(--mt)':pct>=100?'var(--g)':pct>=80?'var(--a)':'var(--r)';
    const stopInfo=p.stopType?`<span class="chip" style="background:${STOP_TYPES.find(s=>s.key===p.stopType)?.color||'#888'}22;color:${STOP_TYPES.find(s=>s.key===p.stopType)?.color||'#888'};border:1px solid ${STOP_TYPES.find(s=>s.key===p.stopType)?.color||'#888'}44">${p.stopType}</span>`:'';
    // Shu sana/smena uchun andon muammolari (M)
    const relAndons=G.andons().filter(a=>a.stopType==='M'&&a.openedAt&&a.openedAt.startsWith(p.date));
    const andonInfo=relAndons.length&&(p.stops||[]).find(s=>s.type==='M')?
      relAndons.map(a=>`<div style="font-family:var(--mn);font-size:9px;color:var(--p);margin-top:2px">⚙️ ${a.openedAt.slice(11)} ${a.machineId||''}: ${a.reason}</div>`).join(''):'';
    // Barcha stops izohlar
    const allStopText=(p.stops||[]).map(s=>`<div style="font-family:var(--mn);font-size:9px;color:var(--mt2);margin-top:1px">${s.type}: ${s.reason}${s.extraStops?.length?' | '+s.extraStops.join(', '):''}</div>`).join('')||
      (p.stopReason?`<div style="font-family:var(--mn);font-size:9px;color:var(--mt2);margin-top:2px">${p.stopReason}</div>`:'');
    return `<tr style="border-bottom:1px solid rgba(30,36,53,.3)">
      <td style="padding:8px 12px;font-family:var(--mn);font-size:11px;color:var(--a);font-weight:700;white-space:nowrap">${p.code}</td>
      <td style="padding:8px 12px;font-size:12px;font-weight:600">${p.name}<div style="font-family:var(--mn);font-size:9px;color:var(--mt2)">${p.model||'—'}</div></td>
      <td style="padding:8px 12px;text-align:center;font-family:var(--mn);font-size:13px;font-weight:700;color:var(--a)">${pv}</td>
      <td style="padding:8px 12px;text-align:center;font-family:var(--mn);font-size:13px;font-weight:700;color:${hasFact?'var(--g)':'var(--mt)'}">${hasFact?fv:'—'}</td>
      <td style="padding:8px 12px;text-align:center;font-family:var(--mn);font-size:12px;color:${c}">${pct!==null?pct+'%':'—'}</td>
      <td style="padding:8px 12px">${stopInfo}${allStopText}${andonInfo}</td>
      ${showActions?`<td style="padding:8px 12px;text-align:right">
        <div style="display:flex;gap:4px;justify-content:flex-end;flex-wrap:wrap">
          ${canEnterFact()?`<button class="btn btn-g btn-sm" onclick="openFactEditor('${p.id}')">📝 Fakt</button>`:''}
          ${canCreatePlan()?`<button class="btn btn-o btn-sm" onclick="openPlanEditor('${p.id}')">✏️</button><button class="btn btn-r btn-sm" onclick="delPlanItem('${p.id}')">🗑</button>`:''}
        </div>
      </td>`:''}
    </tr>`;
  }).join('');

  const totalPlan=plans.reduce((s,p)=>s+(parseInt(p.plan)||0),0);
  const totalFact=plans.filter(p=>p.fact!==undefined&&p.fact!=='').reduce((s,p)=>s+(parseInt(p.fact)||0),0);
  const totPct=totalPlan>0?Math.round((totalFact/totalPlan)*100):null;

  return `<div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;min-width:520px">
      <thead><tr style="background:var(--s2)">
        <th style="font-family:var(--mn);font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:1px;padding:8px 12px;text-align:left;font-weight:400;white-space:nowrap">Detal №</th>
        <th style="font-family:var(--mn);font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:1px;padding:8px 12px;text-align:left;font-weight:400">Nomi / Model</th>
        <th style="font-family:var(--mn);font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:1px;padding:8px 12px;text-align:center;font-weight:400">Reja</th>
        <th style="font-family:var(--mn);font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:1px;padding:8px 12px;text-align:center;font-weight:400">Fakt</th>
        <th style="font-family:var(--mn);font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:1px;padding:8px 12px;text-align:center;font-weight:400">%</th>
        <th style="font-family:var(--mn);font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:1px;padding:8px 12px;text-align:left;font-weight:400">To'xtalish</th>
        ${showActions?'<th></th>':''}
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr style="background:var(--s2);border-top:2px solid var(--bd)">
        <td colspan="2" style="padding:8px 12px;font-family:var(--mn);font-size:10px;font-weight:700;color:var(--mt)">JAMI</td>
        <td style="padding:8px 12px;text-align:center;font-family:var(--mn);font-size:13px;font-weight:700;color:var(--a)">${totalPlan}</td>
        <td style="padding:8px 12px;text-align:center;font-family:var(--mn);font-size:13px;font-weight:700;color:var(--g)">${totalFact}</td>
        <td style="padding:8px 12px;text-align:center;font-family:var(--mn);font-size:13px;font-weight:700;color:${totPct===null?'var(--mt)':totPct>=100?'var(--g)':totPct>=80?'var(--a)':'var(--r)'}">${totPct!==null?totPct+'%':'—'}</td>
        <td colspan="${showActions?2:1}"></td>
      </tr></tfoot>
    </table>
  </div>`;
}

function planCatalogSearch(val){
  const dd=document.getElementById('planCatDd');
  if(!val||val.trim().length<2){dd.style.display='none';return}
  const q=val.trim().toLowerCase();
  const cat=G.catalog();
  const res=cat.filter(c=>c.code.toLowerCase().includes(q)||c.name.toLowerCase().includes(q)).slice(0,8);
  if(!res.length){dd.style.display='none';return}
  dd.style.display='block';
  dd.innerHTML=res.map(c=>`
    <div onmousedown="planCatalogSelect('${c.code.replace(/'/g,"\\'")}','${c.name.replace(/'/g,"\\'")}','${(c.model||'').replace(/'/g,"\\'")}');"
      style="padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--bd)"
      onmouseover="this.style.background='var(--ad)'" onmouseout="this.style.background=''">
      <div style="font-family:var(--mn);font-size:11px;color:var(--a);font-weight:700">${c.code}</div>
      <div style="font-size:11px;font-weight:600">${c.name}</div>
      <div style="font-family:var(--mn);font-size:10px;color:var(--mt2)">${c.model||'—'}</div>
    </div>`).join('');
}
function planCatalogSelect(code,name,model){
  const ci=document.getElementById('pe_code');if(ci)ci.value=code;
  const ni2=document.getElementById('pe_name');if(ni2){ni2.value=name;}
  const mi=document.getElementById('pe_model');if(mi){mi.value=model;}
  const fc=document.getElementById('pe_fullcode');if(fc)fc.textContent=code;
  document.getElementById('planCatDd').style.display='none';
}

function savePlanItem(planId){
  const code=document.getElementById('pe_code')?.value.trim();
  const name=document.getElementById('pe_name')?.value.trim();
  const model=document.getElementById('pe_model')?.value.trim();
  const date=document.getElementById('pe_date')?.value;
  const shift=document.getElementById('pe_shift')?.value;
  const plan=document.getElementById('pe_plan')?.value;
  if(!code||!date||!shift||!plan){alert('Detal raqami, sana, smena va reja majburiy!');return}
  const plans=G.prodPlans();
  const newItem={
    id:planId||('pp_'+Date.now()),
    code,name:name||code,model:model||'—',date,shift,
    plan:parseInt(plan),fact:planId?(plans.find(p=>p.id===planId)?.fact??''):'',
    stopReason:planId?plans.find(p=>p.id===planId)?.stopReason||'':'',
    stopType:planId?plans.find(p=>p.id===planId)?.stopType||'':'',
    status:'active',createdBy:CU.name,ts:Date.now()
  };
  if(planId){const i=plans.findIndex(p=>p.id===planId);if(i>=0)plans[i]={...plans[i],...newItem};}
  else plans.unshift(newItem);
  LS.set('q6_prodplans',plans);
  apiPost('saveProduction',{data:{id:newItem.id,date:newItem.date,shift:newItem.shift,partCode:newItem.code,partName:newItem.name||newItem.code,model:newItem.model||'',planQty:newItem.plan,factQty:newItem.fact||'',stopType:newItem.stopType||'',stopReasons:JSON.stringify(newItem.stops||[]),status:'active',createdBy:CU.name,factBy:'',createdAt:new Date().toISOString(),factAt:''}}).catch(()=>{});
  document.getElementById('planEditorOvl').classList.remove('on');
  renderProdPlan();setPlanTab(curPlanTab);buildNav();
}

function delPlanItem(planId){
  if(!confirm('Bu reja yozuvini o\'chirish?'))return;
  LS.set('q6_prodplans',G.prodPlans().filter(p=>p.id!==planId));
  renderProdPlan();setPlanTab(curPlanTab);buildNav();
}

            <div id="stcheck_${st.key}" style="width:18px;height:18px;border-radius:4px;border:2px solid ${existing?st.color:'var(--bd2)'};background:${existing?st.color+'22':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s">
              ${existing?`<span style="color:${st.color};font-size:12px">✓</span>`:''}

          <div id="streason_${st.key}" style="padding:0 14px ${existing?'12px':'0'};display:${existing?'block':'none'}">
            <input class="inp" id="ff_reason_${st.key}" value="${existing?.reason||''}" placeholder="${st.label} — muammo tavsifi..." style="border-color:${st.color}">
            ${st.key==='M'?`
            <!-- M uchun: shu kun andondagi andonlar + qo'lda yozish -->
            <div style="margin-top:8px">
              <div style="font-family:var(--mn);font-size:9px;color:var(--mt);letter-spacing:1px;margin-bottom:4px">SHU SANA ANDONDA YUBORILGAN (M):</div>

  ov.classList.add('on');setTimeout(()=>ov.querySelector('div').style.transform='scale(1)',10);
  // init checked states from existing data
  existStops.forEach(s=>{ activeStops.add(s.type); });
  extraStops=(existStops.find(s=>s.type==='M')?.extraStops)||[];
}

/* Extra stops for M block in fact editor */
let extraStops=[];
function addExtraStop(){
  extraStops.push('');
  const list=document.getElementById('ff_m_extra_list');
  if(!list)return;
  const idx=extraStops.length-1;
  const div=document.createElement('div');
  div.style.cssText='display:flex;gap:4px;align-items:center';
  div.id='extra_stop_'+idx;
  div.innerHTML=`<input class="inp" style="flex:1" placeholder="To'xtalish tavsifi..." oninput="updateExtraStop(${idx},this.value)">
    <button class="btn btn-r btn-sm" onclick="removeExtraStop(${idx})">✕</button>`;
  list.appendChild(div);
}
function updateExtraStop(i,v){extraStops[i]=v;}
function removeExtraStop(i){
  extraStops.splice(i,1);
  const div=document.getElementById('extra_stop_'+i);
  if(div)div.remove();
}

const activeStops=new Set();
function onFactInput(plan){
  const v=parseInt(document.getElementById('ff_fact')?.value||0)||0;
  const sec=document.getElementById('ff_stop_section');
  if(sec) sec.style.display=v<plan?'block':'none';
}
function toggleStopBlock(key,color){
  if(activeStops.has(key)){
    activeStops.delete(key);
    const chk=document.getElementById('stcheck_'+key);const lbl=document.getElementById('stlbl_'+key);const rs=document.getElementById('streason_'+key);
    if(chk){chk.style.border='2px solid var(--bd2)';chk.style.background='transparent';chk.innerHTML='';}
    if(lbl)lbl.style.color='var(--tx)';
    if(rs){rs.style.display='none';rs.style.padding='0 14px 0';}
  } else {
    activeStops.add(key);
    const chk=document.getElementById('stcheck_'+key);const lbl=document.getElementById('stlbl_'+key);const rs=document.getElementById('streason_'+key);
    if(chk){chk.style.border=`2px solid ${color}`;chk.style.background=color+'22';chk.innerHTML=`<span style="color:${color};font-size:12px">✓</span>`;}
    if(lbl)lbl.style.color=color;
    if(rs){rs.style.display='block';rs.style.padding='0 14px 12px';}
    setTimeout(()=>document.getElementById('ff_reason_'+key)?.focus(),50);
  }
}

function saveFact(planId){
  const fact=document.getElementById('ff_fact')?.value;
  if(fact===''||fact===undefined){alert('Fakt sonini kiriting!');return}
  const fv=parseInt(fact)||0;
  const plans=G.prodPlans();
  const i=plans.findIndex(p=>p.id===planId);if(i<0)return;
  const item=plans[i];
  const stopNeeded=fv<parseInt(item.plan||0);
  const stops=[];
  if(stopNeeded){
    STOP_TYPES.forEach(st=>{
      if(activeStops.has(st.key)){
        const reason=document.getElementById('ff_reason_'+st.key)?.value||'';
        const entry={type:st.key,reason,label:st.label};
        // M uchun extra stops ham saqlash
        if(st.key==='M'){
          entry.extraStops=extraStops.filter(s=>s.trim());
        }
        stops.push(entry);
      }
    });
    if(!stops.length){alert('Reja bajarilmagan. Kamida bitta to\'xtalish turini belgilang!');return}
    const missingReason=stops.find(s=>!s.reason);
    if(missingReason){alert(`"${missingReason.label}" uchun muammo tavsifini kiriting!`);return}
  }
  // backward compat: keep stopType & stopReason from first stop
  plans[i]={...item,fact:fv,stops,
    stopType:stops[0]?.type||'',stopReason:stops.map(s=>s.type+': '+s.reason).join(' | ')||'',
    factBy:CU.name,factTs:Date.now()};
  LS.set('q6_prodplans',plans);
  apiPost('updateProduction',{id:planId,data:{factQty:fv,stopType:stops[0]?.type||'',stopReasons:JSON.stringify(stops),factBy:CU.name,factAt:new Date().toISOString()}}).catch(()=>{});
  activeStops.clear();
  document.getElementById('factEditorOvl').classList.remove('on');
  renderProdPlan();setPlanTab(curPlanTab);buildNav();
}

/* ─── Production History ─── */
function openProdHistory(){setTop('Rejalashtirish tarixi','Reja-Fakt hisoboti');showV('PHV');renderProdHistory()}

let phDateFrom='',phDateTo='',phSearch='';
function renderProdHistory(){
  const sf=document.getElementById('phFrom')?.value||'';
  const st=document.getElementById('phTo')?.value||'';
  const ss=document.getElementById('phSearch')?.value||'';
  phDateFrom=sf;phDateTo=st;phSearch=ss;
  const plans=G.prodPlans();
  const phv=document.getElementById('PHV');
  phv.innerHTML=`
    <div class="vhdr">
      <div><div class="vtitle">📅 REJALASHTIRISH TARIXI</div><div class="vsub">// Jami ${plans.length} ta yozuv</div></div>
      <button class="btn btn-a btn-sm" onclick="exportProdHistExcel()">⬇ Excel</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <input type="date" id="phFrom" value="${phDateFrom}" style="background:var(--ib);border:1px solid var(--bd2);color:var(--tx);font-family:var(--mn);font-size:11px;padding:7px 9px;border-radius:5px;outline:none;flex:1;min-width:120px" oninput="renderProdHistory()">
      <input type="date" id="phTo" value="${phDateTo}" style="background:var(--ib);border:1px solid var(--bd2);color:var(--tx);font-family:var(--mn);font-size:11px;padding:7px 9px;border-radius:5px;outline:none;flex:1;min-width:120px" oninput="renderProdHistory()">
      <input type="text" id="phSearch" value="${phSearch}" placeholder="Detal raqami, nomi..." style="background:var(--ib);border:1px solid var(--bd2);color:var(--tx);font-family:var(--mn);font-size:11px;padding:7px 9px;border-radius:5px;outline:none;flex:2;min-width:160px" oninput="renderProdHistory()">
      <button class="btn btn-o btn-sm" onclick="document.getElementById('phFrom').value='';document.getElementById('phTo').value='';document.getElementById('phSearch').value='';renderProdHistory()">Tozalash</button>
    </div>
    <div id="phTable"></div>`;
  filterProdHistory();
}

function filterProdHistory(){
  const plans=G.prodPlans();
  const from=document.getElementById('phFrom')?.value||'';
  const to=document.getElementById('phTo')?.value||'';
  const q=(document.getElementById('phSearch')?.value||'').toLowerCase().trim();
  const filtered=plans.filter(p=>{
    const dm=(!from||p.date>=from)&&(!to||p.date<=to);
    const pm=!q||p.code?.toLowerCase().includes(q)||p.name?.toLowerCase().includes(q)||p.model?.toLowerCase().includes(q);
    return dm&&pm;
  }).sort((a,b)=>b.date.localeCompare(a.date)||b.ts-a.ts);

  const t=document.getElementById('phTable');if(!t)return;
  if(!filtered.length){t.innerHTML=`<div class="empty">Yozuvlar topilmadi</div>`;return}

  t.innerHTML=`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;min-width:700px">
    <thead><tr style="background:var(--s2)">
      <th style="font-family:var(--mn);font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:1px;padding:8px 12px;text-align:left;font-weight:400;white-space:nowrap">Sana</th>
      <th style="font-family:var(--mn);font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:1px;padding:8px 12px;text-align:center;font-weight:400;white-space:nowrap">Smena</th>
      <th style="font-family:var(--mn);font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:1px;padding:8px 12px;text-align:left;font-weight:400">Detal №</th>
      <th style="font-family:var(--mn);font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:1px;padding:8px 12px;text-align:left;font-weight:400">Nomi</th>
      <th style="font-family:var(--mn);font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:1px;padding:8px 12px;text-align:center;font-weight:400">Reja</th>
      <th style="font-family:var(--mn);font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:1px;padding:8px 12px;text-align:center;font-weight:400">Fakt</th>
      <th style="font-family:var(--mn);font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:1px;padding:8px 12px;text-align:center;font-weight:400">%</th>
      <th style="font-family:var(--mn);font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:1px;padding:8px 12px;text-align:center;font-weight:400">Tur</th>
      <th style="font-family:var(--mn);font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:1px;padding:8px 12px;text-align:left;font-weight:400">To'xtalish sababi</th>
      <th style="font-family:var(--mn);font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:1px;padding:8px 12px;text-align:left;font-weight:400">Model</th>
    </tr></thead>
    <tbody>
    ${filtered.map(p=>{
      const fv=p.fact!==undefined&&p.fact!==''?parseInt(p.fact):null;
      const pv=parseInt(p.plan)||0;
      const pct=fv!==null&&pv>0?Math.round((fv/pv)*100):null;
      const c=pct===null?'var(--mt)':pct>=100?'var(--g)':pct>=80?'var(--a)':'var(--r)';
      const stColor=p.stopType?STOP_TYPES.find(s=>s.key===p.stopType)?.color:'';
      return `<tr style="border-bottom:1px solid rgba(30,36,53,.3)">
        <td style="padding:8px 12px;font-family:var(--mn);font-size:11px">${p.date}</td>
        <td style="padding:8px 12px;text-align:center;font-size:12px">${p.shift==='tungi'?'🌙':'☀️'}</td>
        <td style="padding:8px 12px;font-family:var(--mn);font-size:11px;color:var(--a);font-weight:700">${p.code}</td>
        <td style="padding:8px 12px;font-size:12px;font-weight:600">${p.name}</td>
        <td style="padding:8px 12px;text-align:center;font-family:var(--mn);font-size:12px;font-weight:700;color:var(--a)">${pv}</td>
        <td style="padding:8px 12px;text-align:center;font-family:var(--mn);font-size:12px;font-weight:700;color:${fv!==null?'var(--g)':'var(--mt)'}">${fv!==null?fv:'—'}</td>
        <td style="padding:8px 12px;text-align:center;font-family:var(--mn);font-size:12px;color:${c}">${pct!==null?pct+'%':'—'}</td>
        <td style="padding:8px 12px;text-align:center">${p.stopType?`<span style="font-family:var(--dp);font-size:16px;color:${stColor}">${p.stopType}</span>`:'—'}</td>
        <td style="padding:8px 12px;font-family:var(--mn);font-size:10px;color:var(--mt2)">${p.stopReason||'—'}</td>
        <td style="padding:8px 12px;font-family:var(--mn);font-size:11px;color:var(--mt2)">${p.model||'—'}</td>
      </tr>`;
    }).join('')}
    </tbody>
  </table></div>`;
}

function exportProdHistExcel(){
  const plans=G.prodPlans();
  const from=document.getElementById('phFrom')?.value||'';
  const to=document.getElementById('phTo')?.value||'';
  const q=(document.getElementById('phSearch')?.value||'').toLowerCase().trim();
  const filtered=plans.filter(p=>{
    const dm=(!from||p.date>=from)&&(!to||p.date<=to);
    const pm=!q||p.code?.toLowerCase().includes(q)||p.name?.toLowerCase().includes(q)||p.model?.toLowerCase().includes(q);
    return dm&&pm;
  }).sort((a,b)=>b.date.localeCompare(a.date));
  const rows=[['Sana','Smena','Detal raqami','Detal nomi','Model','Reja','Fakt','%','To\'xtalish turlari','Izohlar','Andon (M) muammolari','Reja kiritdi']];
  filtered.forEach(p=>{
    const fv=p.fact!==undefined&&p.fact!==''?parseInt(p.fact):'';
    const pv=parseInt(p.plan)||0;
    const pct=fv!==''&&pv>0?Math.round((fv/pv)*100)+'%':'—';
    const stopTypes=(p.stops||[]).map(s=>s.type).join(', ')||p.stopType||'—';
    const stopReasons=(p.stops||[]).map(s=>s.type+': '+s.reason+(s.extraStops?.length?' ('+s.extraStops.join('; ')+')':'')).join(' | ')||p.stopReason||'—';
    // Shu sana andondagi M muammolari
    const relAndons=G.andons().filter(a=>a.stopType==='M'&&a.openedAt&&a.openedAt.startsWith(p.date));
    const andonText=relAndons.length?relAndons.map(a=>`${a.openedAt.slice(11)} ${a.machineId||''}: ${a.reason} [${a.status==='open'?'Ochiq':'Yopildi'}]`).join(' | '):'—';
    rows.push([p.date,p.shift,p.code,p.name,p.model||'—',pv,fv,pct,stopTypes,stopReasons,andonText,p.createdBy||'—']);
  });
  downloadCSV(rows,'reja_fakt_tarixi_'+curDate()+'.xls');
}
